]
files_modify = [
  "src/index.ts",
]
acceptance = [
  "Existing stdio startup path still works.",
  "Tests can instantiate isolated MCP server instances without auto-starting the process.",
  "Tool and resource registration no longer depends on one process-global server object.",
]
produces = ["ART:server-factory"]
consumes = ["ART:product-contract"]
critical_decisions = [
  "Use one MCP server instance per Streamable HTTP transport session.",
]
constraints = [
  "Do not regress existing MCP tool names.",
]
failure_modes = [
  "If hidden module globals remain, concurrent HTTP sessions may leak state.",
]
rationale = "Remote MCP clients are session-oriented. A factory is the foundation for HTTP transport and testability."

