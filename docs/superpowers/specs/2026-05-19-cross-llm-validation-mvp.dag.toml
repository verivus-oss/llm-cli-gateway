# Personal Cross-LLM Validation MCP MVP DAG
# Package llm-cli-gateway as a single-user personal MCP appliance that
# non-developers can install and configure with assistance from any target LLM.
#
# HARD INVARIANTS:
#   - `blocks` is exact inverse of direct `depends_on`
#   - each `ART:` id has exactly one producer
#   - each `consumes` entry matches an existing `produces` entry exactly
#   - `layer` ordering follows dependency ordering
#   - `[computed]` values are derived from `units`, never guessed
#
# STATUS VALUES: "pending" | "in_progress" | "done" | "blocked" | "deferred"
# TIER VALUES:   1 = MVP release, 2 = next release, 3 = deferred / demand-driven

