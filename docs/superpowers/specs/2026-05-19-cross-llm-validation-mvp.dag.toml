# Personal Cross-LLM Validation MCP MVP DAG
# Package llm-cli-gateway as a single-user personal MCP appliance that
# non-developers can install and configure with assistance from any target LLM.
#
# HARD INVARIANTS:
#   - `blocks` is exact inverse of direct `depends_on`
#   - each `ART:` id has exactly one producer
#   - each `consumes` entry matches an existing `produces` entry exactly
#   - `layer` ordering follows dependency ordering
#   - `[computed]` values are derived from `units`, never guessed
#
# STATUS VALUES: "pending" | "in_progress" | "done" | "blocked" | "deferred"
# TIER VALUES:   1 = MVP release, 2 = next release, 3 = deferred / demand-driven

[meta]
title = "Personal cross-LLM validation MCP MVP"
spec = "docs/superpowers/specs/2026-05-19-cross-llm-validation-mvp.dag.toml"
decomposition = "docs/superpowers/specs/2026-05-19-cross-llm-validation-mvp.dag.toml"
created = "2026-05-19"
total_units = 20
tier1_units = [
  "U01",
  "U02",
  "U03",
  "U04",
  "U05",
  "U06",
  "U07",
  "U08",
  "U09",
  "U10",
  "U11",
  "U12",
  "U13",
  "U14",
  "U15",
  "U16",
  "U17",
  "U18",
  "U19",
  "U20",
]
tier2_units = []
tier3_units = []

[product]
problem = "Non-developers should be able to connect one personal MCP endpoint to their preferred AI clients and ask for cross-LLM validation without understanding MCP, CLIs, TOML, JSON, or provider-specific config."
solution = "Ship llm-cli-gateway as a single-user personal MCP appliance with Streamable HTTP, a single-binary installer/bootstrapper, guided provider login, simple validation tools, and LLM-assistable setup artifacts for each target provider."
non_goals = [
  "Multi-tenant SaaS.",
  "Hosted custody of provider credentials.",
  "A proprietary replacement chat UI.",
  "Consumer Gemini web or Grok web inbound MCP support unless provider support is confirmed.",
]

[mvp]
deployment_model = "single_user_personal_gateway"
primary_transport = "streamable_http"
legacy_transport = "stdio"
auth_model = "bearer_token_v1"
credential_model = "provider_credentials_stored_on_user_owned_machine_or_volume"
target_user = "non_developer_power_user"
install_primary = "single_binary_bootstrapper"
install_language_candidates = ["go", "rust"]
install_language_recommendation = "go"
install_language_rationale = "Go is preferred for the MVP bootstrapper because static cross-platform binaries, filesystem/config edits, process supervision, and simple embedded HTTP setup UI are straightforward. Rust remains a strong option if the bootstrapper grows into a long-lived native runtime."
single_binary_definition = "The MVP binary must either embed the gateway runtime or fetch a version-pinned verified bundle. If Node remains a host prerequisite, the product must not describe the happy path as a self-contained single-binary install."

[endpoint_exposure]
requirement = "Web clients require an HTTPS-reachable MCP endpoint. The MVP must own a local-only mode and at least one guided tunnel/proxy path before claiming web-client support."
candidate_paths = ["tailscale_funnel", "cloudflare_tunnel", "ngrok_for_testing", "byo_reverse_proxy"]
must_redact = ["authorization_header", "bearer_token", "provider_credentials", "tunnel_tokens"]

[llm_assisted_install]
requirement = "The install and setup flow must be structured so any target LLM can guide or perform configuration for the user."
design_rule = "Every setup step must exist in both human-readable markdown and machine-readable TOML/JSON task form."
assistant_prompt_pack_required = true
idempotent_commands_required = true
copy_paste_safe_required = true
diagnostic_json_required = true
rollback_guidance_required = true
manual_code_editing_allowed = false

[provider_targets.chatgpt]
kind = "web"
connection = "remote_mcp_https"
minimum_mvp = true
support_status = "must_confirm_before_release"
setup_artifact = "setup/providers/chatgpt.md"

[provider_targets.claude_web]
kind = "web"
connection = "remote_mcp_https"
minimum_mvp = true
support_status = "must_confirm_before_release"
setup_artifact = "setup/providers/claude-web.md"

[provider_targets.claude_desktop]
kind = "desktop"
connection = "remote_mcp_or_stdio"
minimum_mvp = true
support_status = "must_confirm_before_release"
setup_artifact = "setup/providers/claude-desktop.md"

[provider_targets.codex]
kind = "cli_or_ide"
connection = "streamable_http_or_stdio"
minimum_mvp = true
support_status = "must_confirm_before_release"
setup_artifact = "setup/providers/codex.md"

[provider_targets.gemini_cli]
kind = "cli"
connection = "streamable_http_or_stdio"
minimum_mvp = true
support_status = "must_confirm_before_release"
setup_artifact = "setup/providers/gemini-cli.md"

[provider_targets.gemini_web]
kind = "web"
connection = "unknown_or_enterprise_only"
minimum_mvp = false
support_status = "deferred_until_confirmed"
setup_artifact = "setup/providers/gemini-web-status.md"

[provider_targets.grok]
kind = "api_or_cli"
connection = "remote_mcp_for_api_or_provider_cli_adapter"
minimum_mvp = false
support_status = "outbound_provider_first_inbound_deferred_until_confirmed"
setup_artifact = "setup/providers/grok.md"

