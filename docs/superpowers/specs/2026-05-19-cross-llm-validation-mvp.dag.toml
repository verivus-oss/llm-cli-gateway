  "Document says single-user only and explicitly rejects hosted multi-tenant credential custody.",
  "Support matrix distinguishes inbound MCP clients from outbound validation providers.",
  "User workflow is phrased as 'connect one MCP endpoint, ask any client for cross-LLM validation'.",
  "Every provider target has a support_status field and every minimum_mvp=true target is gated by provider-support verification before user-facing setup docs claim support.",
