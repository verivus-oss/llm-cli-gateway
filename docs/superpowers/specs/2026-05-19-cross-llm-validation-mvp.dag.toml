]
rationale = "The MVP needs a narrow contract before implementation. It is a personal appliance, not SaaS."

# ============================================================================
# LAYER 1: Core design decisions
# ============================================================================

[units.U02]
name = "mcp-server-factory-refactor"
summary = "Refactor current singleton MCP server construction into createGatewayServer(deps), preserving stdio while enabling per-session HTTP server instances."
layer = 1
tier = 1
status = "pending"
depends_on = ["U01"]
blocks = [
  "U05",
  "U06",
  "U07",
]
estimated_loc = 220
spec_sections = ["Architecture"]
spec_anchors = ["architecture"]
files_create = [
  "src/gateway-server.ts",
]
files_modify = [
  "src/index.ts",
]
acceptance = [
  "Existing stdio startup path still works.",
  "Tests can instantiate isolated MCP server instances without auto-starting the process.",
  "Tool and resource registration no longer depends on one process-global server object.",
]
produces = ["ART:server-factory"]
consumes = ["ART:product-contract"]
critical_decisions = [
  "Use one MCP server instance per Streamable HTTP transport session.",
]
constraints = [
  "Do not regress existing MCP tool names.",
]
failure_modes = [
  "If hidden module globals remain, concurrent HTTP sessions may leak state.",
]
rationale = "Remote MCP clients are session-oriented. A factory is the foundation for HTTP transport and testability."

[units.U03]
name = "single-binary-installer-feasibility-spike"
summary = "Prove and document the MVP single-binary bootstrapper architecture, language choice, command surface, release targets, payload size, and interaction with the existing Node gateway."
layer = 1
tier = 1
status = "pending"
depends_on = ["U01"]
blocks = [
  "U08",
]
estimated_loc = 160
spec_sections = ["MVP", "Installer"]
spec_anchors = ["mvp", "install_primary"]
files_create = [
  "docs/personal-mcp/SINGLE_BINARY_INSTALLER.md",
]
files_modify = []
acceptance = [
  "Decision record compares Go and Rust for bootstrapper, setup UI, process supervision, config editing, and cross-platform distribution.",
  "MVP recommendation is explicit: Go bootstrapper unless a Rust runtime requirement appears.",
  "Decision includes a prototype build result or equivalent feasibility evidence for the chosen path.",
  "Decision records measured binary size, first-run payload size, and whether Node is embedded, downloaded as a verified bundle, or remains a host prerequisite.",
  "If Node remains a host prerequisite, the document forbids describing the happy path as self-contained single-binary install.",
  "Decision explains whether the binary embeds the Node gateway bundle or downloads/verifies it with checksums/signatures.",
  "Release targets include macOS arm64/x64, Linux x64/arm64, and Windows x64.",
]
produces = ["ART:binary-packaging-decision"]
consumes = ["ART:product-contract"]
critical_decisions = [
  "Single binary is the primary non-developer install path.",
  "The bootstrapper may supervise the existing Node gateway rather than rewriting the gateway in Go/Rust for MVP.",
  "The graph does not proceed to bootstrapper scaffolding until the Node runtime packaging question is resolved.",
]
constraints = [
  "Must not require npm, git, or Docker for the happy path.",
  "Must be scriptable by an LLM assistant using copy/paste commands.",
]
failure_modes = [
  "Embedding too much runtime logic in the bootstrapper could fork product behavior from the Node MCP server.",
]
rationale = "Non-developers need a single executable before they need Docker or npm options."

[units.U04]
