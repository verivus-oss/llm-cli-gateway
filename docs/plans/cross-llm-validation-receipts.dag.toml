[rollback]
guidance = """
The feature is additive and gated. To disable: do not register the
`validation_receipt` tool / resource and do not create the `validation_runs` /
`validation_receipts` tables; the validation tools revert to their pre-receipt
behaviour and `validationId` is still returned at kickoff. The §5a `job_status` /
`job_result` owner check is a security fix and must NOT be rolled back. The
report terminal-status enum extension is backward-compatible; if a consumer
breaks, pin it as `validation-report.v2` rather than reverting the terminal state.
"""
