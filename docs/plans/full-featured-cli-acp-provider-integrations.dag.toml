  "npm run provider:surfaces:check",
]

[[nodes]]
id = "phase-1b-runtime-capability-discovery"
phase = "discovery"
depends_on = ["phase-1-provider-definition-source-of-truth"]
description = """
Implement runtime capability discovery and caching. The gateway must discover
installed CLI and ACP capabilities from the executable version, help output,
model commands, subcommand help, and ACP initialize responses. Version-specific
capabilities must not be hardcoded into request/resource/admin surfaces.
"""
files = [
