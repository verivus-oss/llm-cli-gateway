]
resource_gap = "src/resources.ts manually lists sessions:// and models:// resources for claude, codex, gemini, grok, and mistral only; devin and cursor request tools exist but their static resources are absent."
provider_capability_gap = "src/provider-tool-capabilities.ts contains detailed caveats and unsupported-input rows, but provider resources and admin surfaces are not generated from the same provider object."
acp_gap = "src/acp/ currently has typed protocol infrastructure and native entries for grok, mistral, devin, and cursor, but existing capability text still uses limited-runtime wording and some request paths reject provider-specific ACP controls instead of surfacing the full native protocol."
upstream_contract_gap = "src/upstream-contracts.ts targets older versions for several providers and includes status labels that describe limited support instead of a full-featured capability contract."
admin_gap = "provider_subcommands_* exposes read-only contracts, but provider-owned admin commands such as MCP, plugin, auth, sessions, status, cloud, dashboard, workers, sandbox, and diagnostics are not uniformly exposed as typed gateway operations."
model_gap = "list_models supports all CLI_TYPES, but resource listing and per-provider model discovery are inconsistent, and several providers require live account-specific discovery through their own commands."

[global_full_featured_contract]
principle = "A provider integration is complete only when documented CLI and native ACP behaviors are discoverable, typed, routable, observable, tested, and documented through one provider definition."
dry_principle = "Provider and capability data must be declared once. Adding a provider, CLI flag, ACP method, model discovery command, session resource, admin subcommand, or safety mode in the provider definition must automatically update every gateway surface or fail CI with a precise missing-surface error."
version_upgrade_principle = "Updating any installed provider CLI or ACP server version must be a discovery event, not a coding event. The gateway discovers the new version, help surface, model catalog, subcommands, ACP initialize capabilities, session capabilities, config options, and admin operations, then enables safe supported capabilities automatically."

provider_object_requirements = [
  "Each provider definition declares executables, command aliases, version probes, model probes, session probes, request transports, native ACP entrypoints, admin subcommands, safety modes, output formats, streaming formats, and docs URLs.",
  "Provider definitions declare discovery commands and normalization rules, not a hand-coded inventory of every version-specific flag.",
  "Request tool schemas, async schemas, resource lists, model resources, session resources, provider capability resources, upstream contract reports, and docs tables are generated or checked from discovered provider capabilities.",
  "No provider-specific one-off omission is allowed unless a typed provider capability says the upstream CLI does not expose that behavior and a test proves the gateway reports that accurately.",
  "Every provider definition includes a drift probe that compares installed help output with the checked-in contract without spending model tokens.",
  "Hand-maintained provider allowlists are forbidden outside the provider definition module and generated test snapshots.",
  "Provider-specific switch statements are forbidden for capability discovery, resource registration, docs generation, and provider tool metadata unless a compile-time exhaustiveness helper proves every provider is covered.",
  "Every surfaced provider list must be derived from the same provider definition iterator."
]

automatic_surface_requirements = [
  "MCP tool registration updates automatically for sync request, async request, admin tools, and smoke/diagnostic tools.",
  "Tool input schemas update automatically from provider capability descriptors and per-field emitters.",
  "list_models updates automatically for provider catalog, aliases, defaults, and live model discovery commands.",
  "provider_tool_capabilities updates automatically for CLI, ACP, admin, model, session, safety, MCP, plugin, and docs capability rows.",
  "provider_subcommands catalog and drift probes update automatically for every declared admin and request subcommand.",
  "resources list and read handlers update automatically for models://<provider>, sessions://<provider>, provider-tools://<provider>, provider-subcommands://<provider>, and provider-acp://<provider>.",
  "server instructions and README provider tables update from generated provider summaries or checked templates.",
  "tests enumerate provider definitions and fail on missing request tools, async tools, resources, capabilities, admin operations, upstream contracts, docs rows, or validation fixtures.",
  "release and install diagnostics use provider definitions for provider names, executable names, login hints, versions, and upgrade commands."
]

[runtime_self_discovery_contract]
principle = "The gateway should discover what the installed provider can do and expose that discovered surface consistently. Checked-in contracts are guardrails and regression fixtures; they are not the only source of truth for installed capability."
discovery_times = [
  "server startup",
  "explicit provider_capabilities_refresh tool call",
  "explicit upstream_contracts probeInstalled=true call",
  "after cli_upgrade succeeds",
  "when executable path, version output, or help checksum changes",
]
cache_key_fields = [
  "provider id",
  "executable absolute path",
  "version string",
  "help output checksum",
  "subcommand help checksums",
  "ACP initialize response checksum",
  "model catalog checksum",
  "gateway version",
]
cache_storage_policy = [
  "Cache discovered capabilities on disk under the existing gateway state directory.",
  "Invalidate cache automatically when any cache key field changes.",
  "Expose cache age, source, version, and checksum through provider_tool_capabilities and provider-subcommands resources.",
  "Never cache secrets, auth tokens, OAuth codes, bearer headers, or account identifiers.",
]
cli_discovery_inputs = [
  "--version or version subcommand",
  "--help",
  "help <subcommand> or <subcommand> --help",
  "models or --list-models where available",
  "doctor/status/about commands where read-only",
  "completion metadata where useful and safe",
  "machine-readable JSON modes where upstream provides them",
]
acp_discovery_inputs = [
  "native entrypoint help/version probe",
  "initialize response protocolVersion",
  "initialize response agentInfo",
  "initialize response auth methods",
  "initialize response promptCapabilities",
  "initialize response mcpCapabilities",
  "initialize response sessionCapabilities",
  "session/new and session/load config options",
  "available_commands_update notifications",
  "current_mode_update and config_option_update notifications",
]
automatic_enablement_rules = [
  "Read-only discovered operations are exposed immediately as read-only resources or read-only tools.",
  "Mutating discovered operations are exposed only when the provider definition marks the command family as safe-to-gate and gateway config enables provider admin mutation.",
  "New request flags are exposed when the discovery normalizer can infer arity, type, enum values, repeatability, safety class, and argv placement.",
  "New flags with incomplete discovery metadata are exposed in capability reports as discovered-unmapped, with the raw help excerpt checksum and a concrete mapping reason; they are not silently dropped.",
  "Native ACP methods advertised by initialize are enabled through the generic ACP client when the method schema is known to the ACP spec.",
  "Provider-specific ACP extension methods are exposed when the provider definition has an extension namespace normalizer; otherwise they are listed as discovered-unmapped with evidence.",
]
dynamic_schema_policy = [
  "MCP tool schemas are built at server startup from discovered capabilities.",
  "If capabilities are refreshed while the MCP server is running, changed tool schemas require server restart or an explicit surface reload that re-registers tools safely.",
  "Resources may reflect refreshed discovered capabilities immediately when their response schema is stable.",
  "The gateway always exposes discovered capability resources, even when request schemas cannot change until reload.",
]
failure_policy = [
  "Discovery failure degrades to the last valid cached capability set if the executable path and version match.",
  "If no cache exists, the provider remains available only through a minimal prompt surface with explicit degraded-capability metadata.",
  "Discovery failures are visible in cli_versions, provider_tool_capabilities, upstream_contracts, and logs.",
]

cli_execution_requirements = [
  "Expose every documented non-interactive run flag accepted by the installed CLI as typed request fields or typed config fields.",
  "Expose interactive-session continuity controls that make sense for automation: continue, resume, fork where available, session id selection, cwd, add-dir or equivalent workspace roots, and output format selection.",
  "Expose safety controls exactly: sandbox modes, permission modes, approval modes, trust flags, allowed/denied tools, agent profiles, model and effort controls, budget limits, max turns, and tool filters.",
  "Normalize text, JSON, JSONL, streaming JSON, structured result rows, tool events, usage rows, and provider-specific errors into gateway structuredContent without losing raw diagnostics in logs.",
  "Preserve provider-owned credential and login flows through typed auth/status diagnostics, never through prompt text guessing."
]

native_acp_requirements = [
  "Where the installed provider exposes a native ACP stdio server, gateway transport=acp supports initialize, authenticate or credential discovery, session/new, session/load, session/resume, session/list, session/prompt, session/cancel, session/close, session/delete, session/set_mode, session/set_config_option, session/request_permission, session/update, host fs, host terminal, MCP server descriptors, and stop reasons to the extent advertised by the provider capability response.",
  "Where a provider does not expose a native ACP entrypoint, gateway reports that fact as an upstream capability fact and still provides complete CLI coverage. It must not label an adapter or a non-native wrapper as native ACP.",
  "ACP permission requests route through the gateway approval manager with allow-once, allow-always, reject, timeout, cancellation, and audit records.",
  "ACP client host services are deny-by-default, workspace-scoped, owner-scoped, and redacted. No provider ACP stdout is ever written to gateway stdout.",
  "ACP session ids remain provider-owned metadata; gateway session ids remain gateway-owned."
]

resource_requirements = [
  "sessions://all includes every CLI provider and every continuity-tracked API provider visible to the caller.",
  "sessions://<provider> exists for every CLI provider, including devin and cursor, and every enabled continuity-tracked API provider.",
  "models://<provider> exists for every CLI provider, including devin and cursor, and every enabled API provider.",
  "provider-tools://<provider> and provider-subcommands://<provider>/... exist for every provider in CLI_TYPES.",
  "ACP capability resources expose native entrypoint, installed probe result, initialize capability response, supported session methods, prompt capabilities, MCP capabilities, auth methods, and host-service policy for each provider."
]

admin_surface_requirements = [
  "Read-only operations must be exposed as typed tools/resources when they do not mutate provider state.",
  "Mutating provider admin operations must require explicit opt-in config, tool annotations, and audit logs.",
  "Admin operations include auth status/login/logout where scriptable, MCP list/get/add/remove/login/logout/enable/disable where available, model list/debug models, plugin list/install/remove/marketplace operations, session list/archive/delete/export/import, update/doctor/status/about, cloud tasks where available, worktree/dashboard/worker controls where available, and sandbox diagnostics where available.",
  "Every admin operation is represented by a provider subcommand contract and tested against help output."
]

security_requirements = [
  "Provider process spawning never uses shell interpolation.",
  "Dangerous modes are explicit request fields with names matching upstream risk semantics.",
  "Credentials are never echoed into MCP responses, docs, logs, plan files, or test snapshots.",
  "Remote HTTP/OAuth callers must use workspace aliases; local stdio callers may pass local paths directly.",
  "Provider-owned MCP config mutation must be gated and audited because it changes a provider's tool surface outside the current request."
]

