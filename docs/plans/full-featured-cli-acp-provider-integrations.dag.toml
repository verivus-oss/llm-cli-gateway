# Implementation plan: full-featured CLI and ACP provider integrations.
#
# Goal:
#   Audit every non-Cursor provider and turn the gateway provider layer into a
#   complete, provider-object driven integration surface. Every documented CLI
#   capability and every native ACP capability exposed by a provider must be
#   represented by typed gateway behavior, resources, capability metadata,
#   tests, and docs. Providers without an upstream native ACP entrypoint must
#   get complete CLI coverage and accurate ACP capability reporting, without
#   claiming native ACP support.

[meta]
name = "full-featured-cli-acp-provider-integrations"
owner = "llm-cli-gateway"
created = "2026-07-01"
status = "draft"
target_branch = "feature/remote-http-oauth-ux-improvements-v2"
scope = "all non-Cursor CLI providers plus shared provider registry and ACP infrastructure"
cursor_companion_plan = "docs/plans/cursor-first-class-provider.dag.toml"
acceptance_resource = "Claude, Codex, Gemini/Antigravity, Grok, Mistral Vibe, and Devin are represented by first-class provider definitions that drive request schemas, resources, model/session discovery, provider capabilities, upstream contract checks, admin subcommands, CLI routing, native ACP routing where upstream exposes it, validation/review participation, docs, and smoke/regression tests."

[audit_method]
web_evidence_date = "2026-07-01"
local_help_date = "2026-07-01"
codebase_evidence_date = "2026-07-01"
must_use_current_sources = true
must_probe_installed_cli_help = true
must_inspect_gateway_code = true
must_avoid_summary_only_evidence = true

source_queries = [
  "Claude Code CLI reference official docs",
  "OpenAI Codex CLI reference official docs",
  "Google Antigravity CLI overview plugins MCP official docs",
  "xAI Grok Build CLI ACP official docs",
  "Mistral Vibe CLI README ACP setup official repository",
  "Devin CLI commands ACP official docs",
  "Agent Client Protocol schema official docs",
]

