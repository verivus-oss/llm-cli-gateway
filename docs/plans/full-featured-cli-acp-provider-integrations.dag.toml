[[nodes]]
id = "phase-1-provider-definition-source-of-truth"
phase = "architecture"
depends_on = ["phase-0-source-and-contract-baseline"]
description = """
Create a provider definition module that becomes the single source of truth for
all CLI provider surfaces. Replace hand-maintained provider lists with generated
or checked projections from the definitions. This is the DRY enforcement phase:
after it lands, adding a provider or provider capability anywhere except the
provider definition is a CI failure.
"""
files = [
  "src/provider-definitions.ts",
  "src/provider-definition-assertions.ts",
  "src/provider-surface-generator.ts",
  "src/provider-types.ts",
  "src/session-manager.ts",
