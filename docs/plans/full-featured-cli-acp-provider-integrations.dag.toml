  "src/__tests__/provider-surface-generator.test.ts",
]
acceptance = [
  "Every CLI_TYPES member has exactly one provider definition.",
  "Provider definitions include executable, docs, request transport, model discovery, session discovery, admin subcommands, ACP metadata, and safety policy.",
  "Build fails if a provider is added without resources, capabilities, upstream contract, and tests.",
  "Build fails if any core gateway surface owns a separate provider list.",
  "Generated projections exist for request tools, async request tools, resources, model listing, session listing, provider capabilities, admin tools, upstream contracts, and docs summaries.",
  "A provider-surface check scans for forbidden manual provider arrays and manual models:// or sessions:// resource blocks.",
]
