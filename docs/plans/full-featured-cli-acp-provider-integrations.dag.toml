  "src/provider-definitions.ts",
  "src/upstream-contracts.ts",
  "src/__tests__/provider-capability-discovery.test.ts",
  "src/__tests__/provider-capability-cache.test.ts",
  "src/__tests__/provider-schema-builder.test.ts",
]
acceptance = [
  "Startup discovers provider version, root help, subcommand help, model catalog, and ACP capability data where available.",
  "Discovered capabilities are cached by provider, executable path, version, help checksum, subcommand checksum, ACP initialize checksum, and model checksum.",
  "Changing only a fake provider version in tests invalidates the old cache and rebuilds projected surfaces without source edits.",
  "Adding only a fake provider help flag in tests produces a discovered safely-mapped request field when arity/type/safety can be inferred.",
