# Implementation plan: integrate @xstate/store v4 as a durable, observable
# agent-state engine inside/alongside llm-cli-gateway.
#
# PROVENANCE: this DAG follows the schema of
# docs/plans/async-flight-recorder.dag.toml (the most recent + most complete
# plan file: schema_version "1.1", [meta] with invariant_sources +
# predecessor_plan, [[steps]] with id/depends_on/actor/action/idempotent/
# validation, [rollback].guidance, [risks].known[]/mitigations[]). Where
# async-flight-recorder and cache-awareness disagreed, async-flight-recorder
# won (it is newer and richer). provider-workflow-assets.dag.toml uses an
# older, thinner schema (schema_version "1.0", no [risks]/[rollback]) and was
# NOT used as the template.
#
# GOAL: give orchestrating agents a small, inspectable, versionable, schema-
# constrained state engine that survives gateway restarts and is observable
# through MCP resources — without storing any conversation content. The store
# becomes a structured "agent scratchpad / workflow state" surface that LLMs
# reason about well (explicit events, strong schemas, `.can` guards), distinct
# from sessions (CLI continuity) and the flight recorder (request telemetry).
#
# SCOPE (incremental, easiest -> most powerful):
#   Phase 1 (read-only resource + dispatch): in-memory store registry,
#     xstate_send / xstate_get_snapshot / xstate_can tools, and
#     agent_state://{storeId} + agent_state://catalog MCP resources.
#   Phase 2 (durability): persist store definitions + snapshots in the SAME
#     SQLite database as async jobs (logs.db), gated on a NEW config flag
#     mirroring persistence.asyncJobsEnabled. backend="none" => no xstate
#     tools registered (structural invariant).
#   Phase 3 (authoring): xstate_create_store, and a skill/workflow memory
#     layer that binds a SKILL.md to a store definition + allowed events.
#   Phase 4 (consensus on state changes): optional consensus_check gate
#     before committing a "significant" event, reusing the gateway's existing
#     multi-LLM validation tools.
#
# NON-GOALS for this plan:
#   - Replacing the session manager or flight recorder. The store is additive.
#   - Multi-instance / Postgres store backend (interface-only, mirrors
#     PostgresJobStore today).
#   - Browser framework bindings (@xstate/store-react etc.) — the gateway is a
#     headless Node MCP server.
#   - Using @xstate/store's `persist` extension for durability (see DESIGN
#     note D3: that extension is browser/localStorage-oriented; the gateway
#     persists via its own SQLite layer instead).
#
# INVARIANT preserved: "No conversation content in session storage" / no
# conversation content in storage (project-root CLAUDE.md + BEST_PRACTICES.md).
# The xstate store holds STRUCTURED agent state (counters, flags, enums, small
# JSON), NOT prompt/response text. This is enforced structurally (Phase 2: a
# context-size cap + a documented "no free-text blobs" rule) and is an
# explicit OPEN QUESTION for human sign-off (see meta.open_questions Q1).

[meta]
name = "llm-cli-gateway @xstate/store v4 integration (durable observable agent-state engine)"
schema_version = "1.1"
owner = "werner"
slice = "xstate-store-phase-1"
target_branch = "feat/xstate-store-integration"
release_version = "UNSET — assign at Phase 1 ship time (next minor after current HEAD)"
acceptance_resource = "agent_state://{storeId} returns a redacted snapshot (context + schema, no free-text) and xstate_send mutates it through declared events only; with backend='none' NONE of the xstate_* tools or agent_state:// resources are registered"
invariant_sources = [
  "/srv/repos/internal/verivusai-labs/rvwr/CLAUDE.md",
  "/srv/repos/internal/verivusai-labs/rvwr/llm-cli-gateway/docs/guides/BEST_PRACTICES.md",
]
predecessor_plan = "docs/plans/async-flight-recorder.dag.toml"

# Companion prose doc for human review:
companion_doc = "docs/plans/xstate-store-integration.md"

# ---------------------------------------------------------------------------
# VERIFIED-vs-UNVERIFIED facts about @xstate/store v4 (confirmed against
# https://stately.ai/docs/xstate-store and .../migration + .../persist +
# .../validate-schemas on 2026-05-30). The plan's design depends on these;
# any step that relies on an UNVERIFIED claim must re-check before coding.
# ---------------------------------------------------------------------------
#
# VERIFIED (v4 docs):
#   - Package name: `@xstate/store`. Requires TypeScript >= 5.4.
#   - Store creation is config-object form ONLY in v4:
#       createStore({ context, on, schemas? })
#     The legacy two-arg `createStore(context, transitions)` was REMOVED in v4
#     (migration guide). The user's proposal sketch used the removed form.
#   - Snapshot read: `store.getSnapshot()` (also `store.get()`). The snapshot
#     has a `.context` field. `store._snapshot` was REMOVED.
#   - Dispatch: `store.trigger.<eventType>(payload)` AND
#     `store.send({ type, ...payload })`. Both exist in v4. The user's
#     `xstate_send({event, payload})` maps cleanly to `store.send`.
#   - Guard check: `store.can.<eventType>(payload)` -> boolean. This is the
#     v4 shape. The user's proposed `.can(event)` single-arg signature is
#     NOT the v4 API; the design uses `store.can[event](payload)`.
#     A transition returning `undefined`/`void` marks the event as not allowed.
#   - Pure transition (no mutation): `store.transition(snapshot, event)`
#     returns `[nextState, effects]` — useful for "dry-run / preview" of a
#     proposed event (DESIGN uses this for the consensus preview in Phase 4).
#   - `store.getInitialSnapshot()` exists (re-seed / reset baseline).
#   - Schemas: v4 supports Standard Schema libraries (Zod is one). Declared
#     under `schemas: { context, events, emitted }`. BY DEFAULT schemas are
#     used for typing/metadata only and are NOT validated at runtime.
#   - Runtime validation is OPT-IN via `validateSchemas()` from
#     `@xstate/store/validate`, attached with `.with(validateSchemas())`.
#     It throws `StoreValidationError` on invalid send/trigger/transition;
#     `store.can.*` stays boolean-only (returns false on validation error).
#   - Extensions exist and attach via `.with(...)`: undo/redo (`undoRedo()`),
#     persist (`persist()` from `@xstate/store/persist`), reset (`reset()`),
#     schema validation (`validateSchemas()`).
#   - Zod compatibility: VERIFIED (Standard Schema; docs examples import `z`).
#
# UNVERIFIED / FLAGGED (do not assert as fact in code/comments):
#   - "~1kb minified+gzipped": this is the PUBLISHER's marketing claim for the
#     CORE package only. Independent inspection of the published tarball shows
#     the core ESM ~2.3KB packed and an internal `store` chunk ~20KB
#     UNminified; the `persist` extension is a SEPARATE ~19KB chunk. Treat
#     "~1kb" as core-only and publisher-stated, NOT independently verified,
#     and note extensions add weight. Bundle size is largely irrelevant for a
#     headless Node MCP server anyway (no client download).
#   - The `persist` extension targets browser/RN storage (localStorage,
#     sessionStorage, AsyncStorage, IndexedDB, BroadcastChannel). It accepts a
#     custom `StateStorage` adapter, but there is NO first-party SQLite
#     adapter. DESIGN D3 therefore does NOT use the persist extension for
#     durability; the gateway serializes snapshots to SQLite itself.
#   - Exact current published v4 patch version: NOT pinned here. The
#     research step (research-xstate-v4-surface) must pin the exact version
#     and re-confirm every API above against the installed package's d.ts.

# ===========================================================================
# PHASE 0 — research + decisions (no behaviour change)
# ===========================================================================

[[steps]]
id = "research-xstate-v4-surface"
depends_on = []
actor = "assistant"
action = """
Pin and verify the @xstate/store v4 surface the design depends on. DO NOT
add the dependency yet (this is a PLAN; dependency add happens in the
implementation slice). Instead:

1. Resolve the exact latest v4 version (npm view @xstate/store version) and
   record it. Confirm peer/runtime requirements (TypeScript >= 5.4 — the repo
   already runs TS 6.x per package.json, so this is satisfied; re-verify).

2. Re-confirm, against the published v4 type declarations (store.d.ts,
   index.d.ts, validate, persist subpath exports), every API the design
   leans on:
     - createStore({ context, on, schemas })   (config-object form ONLY)
     - store.getSnapshot() / store.get()        (snapshot with .context)
     - store.send({ type, ...payload })         (canonical dispatch)
     - store.trigger.<event>(payload)
     - store.can.<event>(payload) -> boolean    (NOT a single-arg can(event))
     - store.transition(snapshot, event) -> [nextState, effects]
     - store.getInitialSnapshot()
     - validateSchemas() from '@xstate/store/validate' (.with(...))
   Record any divergence from the v4 facts block at the top of this DAG and
   FIX the design steps below before coding.

3. Decide the serialization contract for persistence (Phase 2): the store's
   `context` is the ONLY thing persisted (plus the store's definition id +
   schema version). Confirm context is plain-JSON-serializable in the
   gateway's intended use (numbers/strings/booleans/enums/small nested
   objects). Effects, emitted-event listeners, and closures are NOT
   persisted (they are reconstructed from the definition on rehydrate).

4. Write findings to docs/personal-mcp/XSTATE_STORE_SURFACES.md:
     (a) pinned version + the verified API table,
     (b) the "definition vs instance vs snapshot" model the gateway will use,
     (c) the redaction contract (what fields a snapshot resource exposes),
     (d) the SQLite serialization contract (Phase 2),
     (e) explicit list of v4 facts we VERIFIED vs the publisher claims we did
         NOT verify (bundle size, persist-extension storage targets).
"""
idempotent = true
validation = """
docs/personal-mcp/XSTATE_STORE_SURFACES.md exists with: pinned version,
verified API table (each row marked VERIFIED with the d.ts symbol it maps
to), the definition/instance/snapshot model, the snapshot redaction
contract, the SQLite serialization contract, and a VERIFIED-vs-UNVERIFIED
facts section. No design step below references an API not listed VERIFIED
in this note.
"""

[[steps]]
id = "decide-store-definition-model"
depends_on = ["research-xstate-v4-surface"]
actor = "assistant"
action = """
Lock the gateway's three-layer model and document it in
XSTATE_STORE_SURFACES.md:

  - DEFINITION: a named, versioned blob describing a store: its declared
    events (with Zod schemas), initial context, and the transition rules.
    PROBLEM: @xstate/store transitions are JS functions, which cannot be
    safely deserialized from agent-supplied data (arbitrary-code risk).
    DECISION (default, secure): Phase 1/2 definitions are DECLARATIVE only —
    a transition is described by a restricted, data-only DSL the gateway
    interprets, NOT by agent-supplied JS. Supported transition ops (initial
    set): `set` (assign a field), `inc`/`dec` (numeric delta with optional
    min/max guard), `push`/`pop` (bounded array), `setEnum` (constrained
    set). Each op compiles to a real @xstate/store transition function
    INSIDE the gateway. Agents NEVER supply executable code. Record this as
    the security cornerstone (mirrors review-integrity.ts's posture of
    refusing to trust orchestrator-supplied capability).
    Flag as OPEN QUESTION Q2 whether a future "trusted local definition
    file" path (operator-authored JS transitions loaded from disk, like
    skills) should exist — but NOT agent-authored JS, ever.

  - INSTANCE: a live store created from a definition + an initial context
    override, identified by a gateway-generated `storeId`
    (crypto.randomUUID(); 0-prefixless, like async job ids).

  - SNAPSHOT: the redacted view a resource/tool returns: { storeId,
    definitionId, definitionVersion, context, allowedEvents (event types +
    their schemas), createdAt, updatedAt }. NEVER includes raw prompt/
    response text. A context-size cap (default 16 KB serialized JSON) and a
    "scalar/enum/small-object values only; no free-text blobs > N chars"
    rule keep it a STATE surface, not a content store.

Document how this maps to v4: a DEFINITION compiles to a createStore config
object; an INSTANCE is the createStore(...) return; a SNAPSHOT derives from
store.getSnapshot().context plus the definition metadata.
"""
idempotent = true
validation = """
XSTATE_STORE_SURFACES.md documents the definition/instance/snapshot model,
the declarative data-only transition DSL (with the initial op set), the
"no agent-supplied JS" security decision, the context-size cap, and the
snapshot redaction shape. Open questions Q1 (no-free-text enforcement) and
Q2 (trusted operator JS definitions) are recorded.
"""

# ===========================================================================
# PHASE 1 — in-memory store registry, tools, read-only resources
# (no persistence, no config gating yet — fastest path to a usable surface)
# ===========================================================================

[[steps]]
id = "create-store-engine-module"
depends_on = ["decide-store-definition-model"]
actor = "assistant"
action = """
NEW FILE src/xstate-store-engine.ts. This is the gateway-internal wrapper
around @xstate/store v4 — the ONLY module that imports `@xstate/store`
(single dependency surface, mirrors how flight-recorder.ts is the only
better-sqlite3 importer for FR).

Export:
  - interface StoreDefinition { id; version; description?; events:
    Record<eventType, ZodSchema>; initialContext: Record<string, unknown>;
    transitions: TransitionSpec[]; }  // TransitionSpec = the data-only DSL.
  - interface StoreSnapshot { storeId; definitionId; definitionVersion;
    context; allowedEvents: Array<{ type; schema: JSONSchema }>; createdAt;
    updatedAt; }   // serializable, redacted; no functions.
  - class StoreEngine:
      createInstance(def: StoreDefinition, initialOverride?): { storeId }
      send(storeId, event: string, payload?): SendResult
        // compiles event+payload, calls underlying store.send; returns
        // { ok: true, snapshot } or { ok: false, reason } when the event is
        // not allowed (store.can.<event> was false) or unknown.
      can(storeId, event: string, payload?): { allowed: boolean; reason? }
      getSnapshot(storeId): StoreSnapshot | null
      preview(storeId, event, payload?): { nextContext; allowed }
        // uses store.transition(snapshot, evt) — no mutation (Phase 4 dry-run)
      listInstances(): Array<{ storeId; definitionId; updatedAt }>
      deleteInstance(storeId): boolean

Internals:
  - compileDefinition(def) -> @xstate/store config object. Each TransitionSpec
    op compiles to a transition function. validateSchemas() is attached via
    `.with(validateSchemas())` when the definition opts into runtime
    validation (default: ON — we want the schema enforced for agent input).
  - Enforce the context-size cap and the no-free-text rule on every write;
    reject (SendResult.ok=false, reason) rather than truncating.
  - All errors are returned as data (never thrown across the tool boundary);
    internal failures log via the injected Logger (stderr only — NEVER
    console.log).
  - Explicit return types on every exported function (repo convention).

Phase 1 keeps a built-in DEFAULT definition (a small, generic
"agent_workflow" state: { step: string; status: enum; counters: {} }) so the
read-only resource has something to expose before authoring lands.
"""
idempotent = true
validation = """
- npm run build passes; src/xstate-store-engine.ts is the only file importing
  '@xstate/store'.
- Unit tests: createInstance returns a storeId; getSnapshot returns the
  redacted shape with no function fields; send through a declared event
  mutates context; send of an unknown event returns ok=false; can() reflects
  a guarded transition (e.g. inc with max) returning false at the boundary;
  preview() does NOT mutate the live snapshot; context-size cap rejects an
  oversized write.
- All exported functions have explicit return types.
"""

