  - getInstance(storeId): PersistedInstance | null
  - listInstances(): PersistedInstance[]
  - deleteInstance(storeId): boolean
  - mark/evictExpired(): number   // TTL like jobs (reuse retentionDays)
  - close(): void

SqliteStorePersistence:
  - Same constructor pattern as SqliteJobStore: createRequire ->
    better-sqlite3, mkdir, WAL + synchronous=NORMAL, chmod 0o600 on the db
