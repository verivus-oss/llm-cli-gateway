[[steps]]
id = "add-store-persistence-config"
depends_on = ["register-xstate-tools-and-resources-phase1"]
actor = "assistant"
action = """
Add an `[agent_state]` block to the gateway config, loaded by a SEPARATE
loader/schema in src/config.ts (mirrors loadCacheAwarenessConfig — a
malformed [agent_state] must never break [persistence] loading, and vice
versa). NO env-var overrides (TOML only), all defaults OFF.

Schema (Zod, .strict()):
  - enabled: boolean (default false). When false, NO xstate persistence and
    (per the gating step below) the durable behaviour is dormant.
  - backend: enum("sqlite","memory","none") default "sqlite". REUSE the
    async-job DB file by default (logs.db) — a new TABLE, not a new file —
    so there is one durable store to back up. Allow an explicit override
    path; "none" => no durable store; "memory" => process-lifetime only and
    (like persistence.memory) requires acknowledgeEphemeral=true to enable
    the durable-flavoured tools.
  - maxContextBytes: positive int, default 16384 (the context-size cap).
  - maxInstances: positive int, default 256 (DoS guard on instance count).

Export AgentStateConfig with a derived `storeToolsEnabled: boolean`
(true iff enabled && backend in sqlite|memory && (backend!=="memory" ||
acknowledgeEphemeral)) — the EXACT structural mirror of
persistence.asyncJobsEnabled. Thread AgentStateConfig through
GatewayServerRuntime + GatewayServerDeps + resolveGatewayServerRuntime,
exactly as cacheAwareness is threaded.

DECISION: reuse the SqliteJobStore DB *file* but NOT its `jobs` table.
Phase 2 introduces a sibling table (next step). The two share the WAL'd
better-sqlite3 connection ONLY if that is clean to arrange; otherwise open
a second connection to the same path (better-sqlite3 supports concurrent
readers/single writer via WAL). Document the choice in SURFACES.md.
"""
