Interface (definitions + instance snapshots; serializable only):
  - upsertDefinition(def: StoreDefinition): void
  - getDefinition(id, version?): StoreDefinition | null
  - listDefinitions(): Array<{ id; version; description? }>
  - saveInstance(snapshot: PersistedInstance): void
