# ===========================================================================
# rollback + risks
# ===========================================================================

[rollback]
guidance = """
The integration is additive and OFF by default ([agent_state].enabled =
false => no durable tools, no agent_state mutation surface beyond the
ephemeral default). Rollback options, least to most invasive:

1. Config disable (no code change): set [agent_state].enabled = false (or
   backend = "none") in ~/.llm-cli-gateway/config.toml. Per the structural
   invariant, the durable/authoring tools then vanish from the tool list at
   connect time. This is the primary kill switch.

2. Targeted forward-fix: if a bug surfaces in the engine or persistence,
   patch src/xstate-store-engine.ts / src/store-persistence.ts; the in-memory
   default-definition path and the no-op persistence default keep the rest of
   the gateway unaffected.

3. Hard rollback: revert the feature branch / release commit AND remove the
   @xstate/store dependency. The new SQLite tables (agent_state_definitions,
   agent_state_instances) live in logs.db; a revert leaves them as inert
   unused tables (no migration of the existing `jobs`/`requests` tables), so
   revert is non-destructive. Optionally DROP the two tables to reclaim space.

There is no migration to the existing jobs/flight-recorder schema, so a
rollback cannot corrupt async-job or telemetry data.
"""

[risks]
known = [
  "Arbitrary-code risk: @xstate/store transitions are JS functions. If the gateway ever accepted agent-authored JS transitions, an orchestrating agent could run code in the gateway process. MITIGATED by the data-only transition DSL (set/inc/dec/push/pop/setEnum) — agents supply DATA describing transitions; the gateway compiles them. Open question Q2 (operator-authored trusted JS definitions from disk, like skills) is deliberately left for human sign-off.",
  "Storage-invariant erosion: a free-form context could become a backdoor conversation store, violating 'no conversation content in storage'. MITIGATED by maxContextBytes (default 16KB) + a 'scalar/enum/small-object, no long free-text' rule enforced on every write. Open question Q1: is the byte cap + per-field length cap a strong-enough structural guarantee, or does a human want a stricter allow-listed value-type policy?",
  "API-shape divergence from the user's proposal: the user's sketch used the REMOVED two-arg createStore(context, transitions) and a single-arg .can(event). v4 requires the config-object createStore and store.can.<event>(payload). The design uses the verified v4 shapes; if a future v5 changes them again, research-xstate-v4-surface must re-pin. The exact v4 patch version is NOT yet pinned (PLAN-only constraint).",
  "Persist-extension mismatch: @xstate/store's own `persist` extension targets browser/RN storage (localStorage/IndexedDB/BroadcastChannel), NOT SQLite. The design deliberately does NOT use it and serializes snapshots to SQLite via a gateway-owned StorePersistence layer instead. Risk: maintaining a bespoke persistence layer; mitigated by mirroring the already-proven job-store.ts pattern 1:1.",
  "Surface bloat / agent confusion: adding a third stateful surface (store) alongside sessions (CLI continuity) and the flight recorder (telemetry) could confuse orchestrating agents about WHERE to put state. MITIGATED by clear tool descriptions + a README 'state, not content; not a session, not telemetry' section. Decision point for a human: is the agent-state surface worth the cognitive cost, or should it ship behind a louder 'experimental' flag?",
  "Consensus cost/latency (Phase 4): gating state changes on multi-LLM consensus adds real latency and model spend. MITIGATED by being strictly opt-in per call and short-circuiting on .can=false before any model is invoked. Decision point: which transitions (if any) should DEFAULT to consensus, or should it always be caller-explicit?",
  "Bundle-size claim unverified: the publisher's '~1kb' is core-only and not independently confirmed (tarball inspection shows larger unminified chunks + a separate ~19KB persist chunk). Irrelevant operationally (headless Node server) but the README must not repeat '~1kb' as a verified fact.",
]
mitigations = [
  "Data-only transition DSL + 'no agent-supplied JS, ever' as the security cornerstone, enforced in the engine and covered by a mutation-probe test (delete the op allow-list check -> test fails).",
  "maxContextBytes + per-field length policy enforced on every write; redaction asserted structurally in tests (snapshot must contain no prompt/response/system/task field).",
  "research-xstate-v4-surface pins the exact version and re-verifies every API against the installed d.ts before any code lands; the v4 facts block at the top of this DAG is the contract.",
  "StorePersistence mirrors job-store.ts (proven pattern: WAL, 0o600, prepared statements, createJobStore-style factory returning null for backend='none').",
  "Structural-invariant gating (storeToolsEnabled) mirrors persistence.asyncJobsEnabled exactly; a dedicated test asserts disabled-backend registers no durable tools and llm_process_health reports the gate state.",
  "Phased rollout: Phase 1 (read-only + ephemeral) ships and soaks before Phase 2 (durable); Phase 4 (consensus) ships last. Each phase is independently revertable and config-gated.",
  "README documents the verified API and the 'state not content' boundary; the '~1kb' claim is presented as publisher-stated, not verified.",
]
