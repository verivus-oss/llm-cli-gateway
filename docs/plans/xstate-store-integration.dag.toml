[[steps]]
id = "add-sqlite-store-backend"
depends_on = ["add-store-persistence-config"]
actor = "assistant"
action = """
NEW FILE src/store-persistence.ts. Define a StorePersistence interface and
three implementations mirroring job-store.ts EXACTLY (SqliteStorePersistence
