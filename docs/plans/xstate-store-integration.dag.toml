   allowed. If the event is not allowed by `.can`, short-circuit with the
   structured not-allowed error (no model spend).

2. Build a consensus prompt describing (current redacted context, proposed
   event+payload, computed nextContext, the definition's schema/business
   rules) and route it through the gateway's EXISTING validation surface
   (validate-tools.ts / consensus_check) rather than reimplementing
   multi-LLM fan-out. The prompt contains STATE ONLY — no conversation
   content — preserving the storage invariant and keeping the gate cheap.

3. Commit the event ONLY if consensus passes the configured threshold;
   otherwise return the proposed nextContext + the dissenting rationale
   WITHOUT mutating the store. Record the decision (pass/fail + which models)
   in the flight recorder as a normal request row (telemetry), NOT in the
   store context.

This layer is additive and fully optional: default behaviour (no
requireConsensus) is unchanged. Document that consensus adds latency + model
cost and is meant for high-impact transitions only.
