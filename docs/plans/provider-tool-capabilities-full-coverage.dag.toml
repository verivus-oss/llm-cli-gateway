# Implementation plan: full provider tool/feature capability coverage.
#
# Goal: make llm-cli-gateway expose an accurate, machine-readable capability
# inventory for every provider surface it brokers. The inventory must cover
# model capability, provider-native tool controls, local skills, MCP/server
# configuration, multimodal/image/video/document features, web/memory/subagent
# features, structured output, workspace/session controls, and explicit
# unsupported/degraded inputs.
#
# Motivation:
#   A provider CLI may expose capabilities through an agent/tool layer that are
#   not obvious from its model taxonomy. Grok Build is the concrete example:
#   the coding model is not itself the image model, but the installed Grok CLI
#   can call Imagine tools (`image_gen`, `image_edit`, etc.) through a local
#   skill/tool integration. The gateway must surface that local provider-agent
#   capability directly so orchestrators do not make stale assumptions.
#
# Non-goal:
#   This plan does NOT make the gateway directly execute provider-native tools
#   such as Grok `image_gen`. Execution still flows through the provider request
#   tools (`grok_request`, `claude_request`, etc.) unless a later plan designs a
#   separate, security-reviewed direct-tool bridge.

[meta]
name = "provider tool and feature capabilities full coverage"
schema_version = "1.1"
owner = "verivus-oss"
slice = "provider-tool-capabilities-full-coverage-2026-06-12"
target_branch = "master"
release_version = "UNSET — assign at ship time"
predecessor_plan = "docs/plans/provider-subcommands-scope-expansion.dag.toml"
acceptance_resource = "provider_tool_capabilities and provider-tools://* expose a complete, tested capability inventory for every provider surface: Claude Code, Codex CLI, Gemini/Antigravity CLI, Grok CLI, optional Grok API provider, and Mistral Vibe. For each provider, the report separates supported controls, discovered local skills/tools, configured MCP/server surfaces, multimodal/media capabilities, structured output, session/workspace controls, cost/loop controls, and unsupported or degraded inputs."
invariant_sources = [
  "src/index.ts",
  "src/resources.ts",
  "src/provider-tool-capabilities.ts",
  "src/model-registry.ts",
  "src/upstream-contracts.ts",
  "src/request-helpers.ts",
  "src/provider-codegen.ts",
  "src/xai-api-provider.ts",
  "src/doctor.ts",
  "README.md",
  "docs/plans/provider-subcommands-scope-expansion.dag.toml",
]

[decisions]
capability_surface_is_read_only = true
execution_remains_provider_request_based = true
local_skill_discovery_is_bounded = true
capability_report_must_distinguish_model_vs_agent_tools = true
unsupported_inputs_are_first_class = true
all_sync_and_async_provider_tools_share_one_capability_record = true
resource_uris = ["provider-tools://catalog", "provider-tools://{provider}"]
tool_name = "provider_tool_capabilities"
providers_required = ["claude", "codex", "gemini", "grok", "grok_api", "mistral"]

[coverage_matrix]
required_categories = [
  "gateway_request_tools",
  "model_defaults_and_aliases",
  "tool_allow_deny_controls",
  "mcp_server_configuration",
  "native_skills",
  "provider_native_tools",
  "multimodal_inputs",
  "media_generation_or_editing",
  "structured_output",
  "subagents_or_agents",
  "web_search_or_remote_retrieval",
  "memory_controls",
  "workspace_and_worktree_controls",
  "session_continuity",
  "approval_and_sandbox_controls",
  "cost_and_loop_controls",
  "unsupported_or_degraded_inputs",
]

[coverage_matrix.claude]
must_cover = [
  "claude_request",
  "claude_request_async",
  "model/default/alias discovery from model-registry",
  "allowedTools/disallowedTools/tools",
  "mcpServers and generated Claude MCP config",
  "local ~/.claude/skills discovery",
  "agent/agents",
  "outputFormat/jsonSchema/stream-json usage parsing",
  "permissionMode/approvalStrategy/approvalPolicy",
  "addDir/workspace/worktree",
  "continueSession/sessionId/forkSession/noSessionPersistence/settings/settingSources",
  "maxTurns/maxBudgetUsd/effort/fallbackModel",
]

[coverage_matrix.codex]
must_cover = [
  "codex_request",
  "codex_request_async",
  "codex_fork_session",
  "model/default/profile/alias discovery from ~/.codex/config.toml and env",
  "no gateway allowedTools/disallowedTools support",
  "Codex-owned MCP configuration and configured MCP servers where discoverable",
  "local ~/.codex/skills discovery",
  "images attachments",
  "outputFormat=json and outputSchema",
  "sandboxMode/fullAuto/askForApproval/dangerouslyBypassApprovalsAndSandbox",
  "workingDir/addDir/workspace/worktree",
  "sessionId/resumeLatest/createNewSession/ephemeral",
  "profile/configOverrides/ignoreUserConfig/ignoreRules",
]

[coverage_matrix.gemini]
must_cover = [
  "gemini_request",
  "gemini_request_async",
  "model/default/alias discovery and observed local history hints",
  "allowedTools rejected",
  "mcpServers rejected",
  "local ~/.gemini/skills discovery",
  "attachments rejected by current Antigravity path",
  "outputFormat json/stream-json rejected by current Antigravity path",
  "sandbox/yolo/approvalMode",
  "includeDirs/workspace/worktree",
  "sessionId/resumeLatest/createNewSession",
  "policyFiles/adminPolicyFiles/skipTrust unsupported",
]

[coverage_matrix.grok]
must_cover = [
  "grok_request",
  "grok_request_async",
  "model/default/alias discovery",
  "allowedTools/disallowedTools",
  "allow/deny/permissionMode/alwaysApprove",
  "local ~/.grok/skills and ~/.grok/bundled/skills discovery",
  "provider-native skill tools including Imagine image_gen/image_edit/image_to_video/reference_to_video",
  "agent/agents/bestOfN/check/todoGate/noSubagents",
  "disableWebSearch",
  "experimentalMemory/noMemory/noPlan/noAltScreen",
  "promptFile/promptJson/single/verbatim/systemPromptOverride/rules",
  "outputFormat",
  "sandbox/workingDir/workspace/worktree/nativeWorktree",
  "sessionId/resumeLatest/createNewSession/restoreCode/leaderSocket",
  "maxTurns/effort/reasoningEffort/compactionMode/compactionDetail",
]

[coverage_matrix.grok_api]
must_cover = [
  "grok_api_request when providers.xai.enabled is true",
  "xAI API model/default capability table",
  "reasoningEffort/maxOutputTokens/temperature/topP",
  "sessionId/createNewSession",
  "no provider-native local skills",
  "no gateway CLI tool allow/deny controls",
  "explicit distinction from Grok CLI/Build skill tools",
  "image generation is not routed through grok_api_request unless a future API provider surface is designed",
]

[coverage_matrix.mistral]
must_cover = [
  "mistral_request",
  "mistral_request_async",
  "model/default/env alias discovery via VIBE_ACTIVE_MODEL and ~/.vibe/config.toml",
  "allowedTools via --enabled-tools",
  "disallowedTools accepted but ignored",
  "local ~/.vibe/skills discovery if present",
  "agent modes default/plan/accept-edits/auto-approve/chat/explore/lean",
  "outputFormat text/json/streaming aliases",
  "trust/workingDir/addDir/workspace/worktree",
  "sessionId/resumeLatest/createNewSession",
  "maxTurns/maxPrice/maxTokens",
  "no effort/reasoningEffort support",
]

# ===========================================================================
# PHASE 0 — baseline, schema, and taxonomy
# ===========================================================================

[[steps]]
id = "baseline-current-capability-surface"
depends_on = []
actor = "assistant"
action = """
Capture the current public capability surface before changing behavior:

  - `list_models` output for all providers.
  - `provider_tool_capabilities` output for all providers.
  - `provider-tools://catalog` and every `provider-tools://{provider}` resource.
  - `upstream_contracts({ probeInstalled: true })` for installed CLIs.
  - `provider_subcommands_list` output.
  - `cli_versions` output.
  - Request schemas for every provider sync/async tool and `codex_fork_session`.

Store only redacted findings in an untracked note or PR body draft. Do not
commit local account names, access tokens, auth JSON, session transcript text,
or full private filesystem inventories. It is acceptable to record provider
home-relative skill names and capability names.
"""
idempotent = true
validation = """
Baseline note identifies which categories are already surfaced, partially
surfaced, missing, or explicitly unsupported for every provider in
coverage_matrix. No secrets or full raw auth/config files are captured.
"""

[[steps]]
id = "define-capability-schema-v2"
depends_on = ["baseline-current-capability-surface"]
actor = "assistant"
action = """
Replace the ad hoc provider capability shape with an explicit v2 schema in
src/provider-tool-capabilities.ts.

Required top-level shape:

  {
    schemaVersion: "provider-tool-capabilities.v2",
    generatedAt,
    cli,
    providerKind: "cli" | "api",
    gatewayRequestTools: string[],
    modelInfo,
    controls,
    features,
    discoveredSkills,
    discoveredProviderTools,
    configSurfaces,
    unsupportedInputs,
    warnings
  }

Rules:
  - `modelInfo` reuses `getAvailableCliInfo()` data without duplicating model
    parsing logic.
  - `controls` are things the gateway can pass through or reject at request
    schema/argv time.
  - `features` are normalized capability categories from coverage_matrix.
  - `discoveredSkills` are local skill documents, bounded by count and bytes.
  - `discoveredProviderTools` are extracted provider-native tool names with
    source skill/path and confidence.
  - `unsupportedInputs` must be first-class, not buried in prose.
  - Provider paths must be home-relative when possible, with absolute path
    output gated behind an explicit `includePaths` request parameter defaulting
    false.
"""
idempotent = false
validation = """
TypeScript exports explicit interfaces for every v2 shape. Unit tests assert
the response includes schemaVersion, every required category, and all six
provider keys when no cli filter is supplied. TypeScript build passes.
"""

[[steps]]
id = "add-capability-query-options"
depends_on = ["define-capability-schema-v2"]
actor = "assistant"
action = """
Extend `provider_tool_capabilities` inputs:

  - cli?: claude|codex|gemini|grok|grok_api|mistral
  - includeSkills?: boolean = true
  - includeProviderTools?: boolean = true
  - includeUnsupported?: boolean = true
  - includePaths?: boolean = false
  - refresh?: boolean = false

Resource reads should use safe defaults equivalent to:
  includeSkills=true, includeProviderTools=true, includeUnsupported=true,
  includePaths=false, refresh=false.

The `refresh` option bypasses any capability cache added in later steps.
"""
idempotent = false
validation = """
MCP schema snapshot/integration tests prove the new options exist, default
correctly, and filtering does not leak unrequested providers. Path redaction
tests prove absolute home paths are omitted unless includePaths=true.
"""

# ===========================================================================
# PHASE 1 — provider-local discovery
# ===========================================================================

[[steps]]
id = "harden-skill-frontmatter-and-tool-extraction"
depends_on = ["define-capability-schema-v2"]
actor = "assistant"
action = """
Harden local skill parsing:

  - Parse YAML-ish frontmatter enough for `name`, `description`, and nested
    `metadata.short-description`.
  - Support folded (`>`, `>-`) and literal (`|`, `|-`) scalar descriptions.
  - Extract only plausible provider tool identifiers, not every code span.
  - Keep bounded reads: max skill dirs, max file bytes, max extracted tools.
  - Emit confidence and extraction reason for each discovered tool:
      exact-tool-section | known-tool-name | backtick-heuristic | low-confidence
  - Add per-provider known native tool allow-lists where stable:
      Grok: image_gen, image_edit, image_to_video, reference_to_video,
            run_in_background, wait_tasks, get_task_output, spawn_subagent,
            run_terminal_cmd, read_file, search_replace, todo_write.

Do not parse arbitrary scripts or execute provider CLIs to discover skills.
"""
idempotent = false
validation = """
Unit fixtures cover plain, quoted, folded, and nested frontmatter. The Grok
Imagine fixture returns image_gen/image_edit with high confidence. Noise spans
like `file:line`, `name:`, and `max_results` do not appear as high-confidence
provider tools unless explicitly known for that provider.
"""

[[steps]]
id = "discover-provider-config-surfaces"
depends_on = ["define-capability-schema-v2"]
actor = "assistant"
action = """
Add bounded, redacted config-surface discovery:

  Claude:
    - settings paths present/missing.
    - MCP config generation support from gateway mcpServers.
    - local skills count.

  Codex:
    - config.toml present/missing.
    - profiles names and model values via existing model-registry parsing.
    - configured MCP server names if present in config, with command/env
      values redacted.

  Gemini/Antigravity:
    - settings present/missing.
    - local skills count.
    - trusted folders presence only, not contents.

  Grok:
    - config.toml present/missing.
    - user and bundled skills count.
    - MCP config presence via Grok-owned config if safely discoverable.
    - docs/help surface presence.

  Mistral/Vibe:
    - config.toml present/missing.
    - active model source, reusing model-registry.
    - trusted_folders/session_logging presence only, not secret values.
    - local skills count if ~/.vibe/skills exists.

All file output is boolean/count/name-only by default; raw paths require
includePaths=true and still must not include secret/env values.
"""
idempotent = false
validation = """
Unit tests with temp homes prove each provider reports present/missing config
surfaces and redacts env/command values. No auth JSON, access token, or secret
string can appear in serialized capability output.
"""

[[steps]]
id = "add-capability-cache"
depends_on = ["harden-skill-frontmatter-and-tool-extraction", "discover-provider-config-surfaces"]
actor = "assistant"
action = """
Add a short-lived in-memory capability cache, similar to model-registry:

  - Default TTL: 60 seconds.
  - Cache key includes provider and query options that affect content.
  - `refresh=true` bypasses cache.
  - Cache stores only parsed capability metadata, not raw file contents.

Reason: provider capability discovery reads several local directories and may
be called frequently by remote clients.
"""
idempotent = false
validation = """
Unit tests prove cache reuse, refresh bypass, and no stale cross-provider
pollution. Capability cache clear helper exists for tests.
"""

# ===========================================================================
# PHASE 2 — per-provider full coverage
# ===========================================================================

[[steps]]
id = "cover-claude-capabilities"
depends_on = ["define-capability-schema-v2", "discover-provider-config-surfaces"]
actor = "assistant"
action = """
Fill Claude capability coverage:

  - gatewayRequestTools: claude_request, claude_request_async.
  - controls: allowedTools, disallowedTools, tools, permissionMode,
    approvalStrategy, approvalPolicy, mcpServers, strictMcpConfig.
  - features:
      nativeSkills=true, mcpConfig=true, subagents=true,
      structuredOutput=true, streamJsonUsage=true,
      workspace=true, worktree=true, sessionContinuity=true,
      costControls=true, loopControls=true.
  - configSurfaces: settings/local settings presence, skill count, supported
    gateway MCP server names.
  - unsupportedInputs: none for fields currently accepted and emitted; list any
    accepted-but-no-op or deprecated inputs such as dangerouslySkipPermissions.
"""
idempotent = false
validation = """
Claude-specific test asserts every coverage_matrix.claude item is represented
in features, controls, configSurfaces, or unsupportedInputs. Existing Claude
argv tests still pass.
"""

[[steps]]
id = "cover-codex-capabilities"
depends_on = ["define-capability-schema-v2", "discover-provider-config-surfaces"]
