  - configSurfaces:
      profiles, configured MCP server names, config presence, model defaults.
"""
idempotent = false
validation = """
Codex-specific tests assert image attachment, outputSchema, profiles, MCP
server names, and unsupported tool allow/deny semantics are all represented.
Existing Codex argv and fork-session tests still pass.
"""

[[steps]]
id = "cover-gemini-antigravity-capabilities"
depends_on = ["define-capability-schema-v2", "discover-provider-config-surfaces"]
actor = "assistant"
action = """
Fill Gemini/Antigravity capability coverage:

  - gatewayRequestTools: gemini_request, gemini_request_async.
  - controls: approvalMode, yolo, sandbox, includeDirs, workspace, worktree,
