  - configSurfaces:
      user skills, bundled skills, Grok config presence, docs/help presence,
      MCP config presence where safely discoverable.
  - unsupportedInputs:
      mcpServers approval-tracking-only; not a Grok MCP config mutation.
"""
idempotent = false
validation = """
Grok-specific tests assert the local Imagine fixture marks
mediaGenerationOrEditing=true and surfaces image_gen/image_edit as
provider-native tools. Existing Grok schema/argv/golden tests still pass.
"""

[[steps]]
id = "cover-grok-api-capabilities"
depends_on = ["define-capability-schema-v2"]
actor = "assistant"
action = """
Add an explicit `grok_api` provider capability record for the optional xAI API
provider path, separate from Grok CLI:

  - gatewayRequestTools: grok_api_request when xAI API provider is enabled,
    otherwise report disabled with enablement guidance.
  - controls: reasoningEffort, maxOutputTokens, temperature, topP, timeoutMs,
    sessionId/createNewSession.
  - features:
      apiProvider=true,
      structuredTextResponses=true,
      no local native skills,
      no CLI allow/deny tool controls,
      no gateway image-generation route in the current API tool.
  - unsupportedInputs:
      local skills, CLI flags, allowedTools/disallowedTools, workspace/worktree,
      and Grok Imagine image generation are not routed through grok_api_request.

This prevents conflating Grok CLI/Build agent skills with xAI API text calls.
"""
idempotent = false
validation = """
Tests cover xAI API enabled and disabled config. `provider_tool_capabilities`
can filter `cli: "grok_api"` without affecting `cli: "grok"`.
"""

[[steps]]
id = "cover-mistral-vibe-capabilities"
depends_on = ["define-capability-schema-v2", "discover-provider-config-surfaces"]
actor = "assistant"
action = """
Fill Mistral Vibe capability coverage:

