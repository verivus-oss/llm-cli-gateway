  - features:
      nativeSkills=true,
      workspace=true,
      sessionContinuity=true,
      approvalAndSandbox=true.
  - unsupportedInputs:
      allowedTools non-empty rejected,
      mcpServers non-empty rejected,
      outputFormat json/stream-json rejected in current Antigravity path,
      policyFiles/adminPolicyFiles/attachments/skipTrust unsupported.
  - configSurfaces:
      local skills, settings presence, observed model hints.
"""
idempotent = false
validation = """
Gemini-specific tests assert every rejected/unsupported field appears in
unsupportedInputs with behavior=reject. Existing Gemini handler tests still
pass.
"""

[[steps]]
id = "cover-grok-cli-capabilities"
depends_on = ["define-capability-schema-v2", "harden-skill-frontmatter-and-tool-extraction"]
actor = "assistant"
action = """
Fill Grok CLI capability coverage:

  - gatewayRequestTools: grok_request, grok_request_async.
  - controls: allowedTools, disallowedTools, allow, deny, alwaysApprove,
    permissionMode, approvalStrategy, approvalPolicy.
  - features:
      nativeSkills=true,
      providerNativeTools=true,
      mediaGenerationOrEditing=true when Imagine tools are discovered,
      subagents=true,
      webSearchControl=true,
      memoryControl=true,
      workspace/worktree/nativeWorktree=true,
      sessionContinuity=true,
      promptControl=true,
      loopControls=true,
      compactionControls=true.
  - discoveredProviderTools:
      include Grok Imagine tools with source `imagine` and high confidence:
