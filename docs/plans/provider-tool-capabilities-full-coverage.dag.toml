  - provider_tool_capabilities for every provider.
  - upstream_contracts with probeInstalled=true when local CLIs are available.

Compare capability records to src/upstream-contracts.ts and request schemas.
If an installed provider advertises a major new feature that the gateway does
not pass through or report, either add a capability item or add an explicit
unsupported/deferred entry with rationale.
"""
idempotent = true
validation = """
No unclassified installed-provider feature remains in the baseline comparison.
Any upstream drift is either fixed or documented as acknowledged/deferred.
"""

[[steps]]
id = "run-release-gates"
depends_on = ["verify-upstream-contract-alignment", "document-provider-capability-surface"]
actor = "assistant"
action = """
Run release gates:

  - npm run build
  - npm run lint
  - npm run format:check
  - npm test
  - npm run upstream:contracts

If tests rely on local provider homes, use temp-home fixtures. Do not make the
suite depend on this machine's installed private skills.
"""
idempotent = true
validation = """
All release gates pass, or any failure is documented with exact command output,
root cause, and a follow-up step added before shipping.
"""

[[steps]]
id = "write-release-notes"
depends_on = ["run-release-gates"]
actor = "assistant"
action = """
Prepare release notes/changelog text:

  - New read-only provider capability inventory.
  - Full coverage across Claude, Codex, Gemini/Antigravity, Grok CLI,
    Grok API provider, and Mistral Vibe.
  - Grok Imagine/local skill discovery called out as a corrected behavior.
  - Explicit unsupported/degraded input reporting.
  - No direct provider-native tool execution added.
"""
idempotent = true
validation = """
Release note draft is ready, concise, and contains no internal-only paths,
account names, or private skill descriptions beyond generic capability names.
"""

[rollback]
guidance = """
This feature is additive and read-only. If capability reporting causes client
confusion or performance issues, disable only the new discovery paths:

  1. Keep provider request tools unchanged.
  2. Revert provider_tool_capabilities registration and provider-tools://*
     resources.
  3. Leave existing list_models, upstream_contracts, provider_subcommands, and
     request handlers intact.
  4. If necessary, keep a minimal stub that returns schemaVersion and
     unsupported/deferred guidance for one release to avoid hard client breaks.
"""

