[rollback]
guidance = """
The change is additive (new columns, new table, new interface methods, new
config knobs) and the sweep is gated by the lease. To disable durable recovery
without reverting schema: keep markOrphanedOnStartup's deprecated shim as a
no-op and do not start the sweep timer; jobs simply are not auto-recovered
(same as backend='postgres' with the interim gate off). The interim
ownsOrphanRecovery flag must remain PARSED (deprecation warning) even if the
lease path is disabled, so existing configs do not error. Do NOT drop
owner_instance / lease_deadline / gateway_instances once shipped; a mixed-version
fleet during a rolling upgrade relies on the additive columns being present.
The recordComplete guarded WHERE and the fail-closed recordStart are correctness
fixes and must not be reverted independently.
"""
