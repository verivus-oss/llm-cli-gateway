# Implementation plan: durable instance-lease orphan recovery (GitHub #139).
#
# Goal: replace the unscoped blanket startup orphan sweep with a durable,
# per-job fencing lease so a `queued`/`running` job is orphaned iff its owner is
# provably not alive, never because a different live instance started. Correct
# across shared postgres (multi-instance), single postgres, per-process and
# shared-file sqlite, and the memory backend; transport-agnostic (works for the
# no-pid http provider transport); backward-compatible; and free of the
# `running -> orphaned -> completed` flap.
#
# Context:
#   The design spec is docs/plans/issue-139-orphan-recovery.draft.md (v4,
#   APPROVED). It converged over a 4-round adversarial cross-LLM design gate
#   (Codex, Grok, Mistral); v4 has unanimous unconditional approval, all on
#   inspected evidence against the real 9602037 tree. An INTERIM gate already
#   shipped (PR #140, `[persistence].ownsOrphanRecovery`) which merely stops the
#   high-churn stdio case on postgres; this plan is the durable fix that
#   supersedes and then deprecates it.
#
#   Load-bearing facts, each verified in code:
#     1. `markOrphanedOnStartup` is `UPDATE jobs SET status='orphaned' WHERE
#        status='running'` with no owner/lease scoping (src/job-store.ts:468/477
#        sqlite; src/postgres-job-store-worker.ts:216-231 worker), run in the
#        AsyncJobManager constructor (now behind the interim gate).
#     2. `recordComplete` is keyed `WHERE id=@id` only, no status guard
#        (src/job-store.ts:440-444), which is why the false orphan self-heals but
#        also why a naive lease still flaps.
#     3. `recordStart` hard-codes `status:"running"` (src/job-store.ts:506, :849,
#        src/postgres-job-store-worker.ts:148); `JobStoreStatus` excludes
#        `queued` (src/job-store.ts:13); the in-memory machine already has
#        `queued` (src/async-job-manager.ts:75).
#     4. The http provider transport persists no pid (pid column empty), so pid
#        liveness cannot be the primary recovery mechanism.
#     5. A heartbeat that writes a `gateway_instances` row does NOT serialize
#        against a sweep that locks `jobs` rows (different tables). The fix puts
#        the liveness signal ON the job row (`jobs.lease_deadline`) so heartbeat
#        and sweep are same-row UPDATEs that serialize on the row lock.

[meta]
name = "durable instance-lease orphan recovery (#139)"
schema_version = "1.1"
owner = "verivus-oss"
slice = "issue-139-orphan-recovery-2026-07-03"
target_branch = "master"
issue = "https://github.com/verivus-oss/llm-cli-gateway/issues/139"
review_providers = ["codex", "grok", "mistral"]  # gemini/agy returns empty on this class of task; do not gate on it
acceptance_resource = """
A `queued`/`running` job is orphaned iff its owner's per-job `lease_deadline` has
expired (or is NULL for a legacy pre-migration row), never because another live
instance constructed an AsyncJobManager; heartbeat and sweep serialize on the
job row so no job whose owner heartbeated within `leaseTtl` is ever swept; a
genuinely stale-then-reviving owner self-heals to the correct terminal state in
both the job store and the flight recorder; durable admission is fail-closed
(a failed `recordStart` fails the request and releases the limiter permit);
graceful shutdown drains in-flight terminal writes before deregister; the
multi-instance #139 regression and the nested-agent E2E never observe a spurious
`orphaned`; `npm run check` and `npm run test:pg` pass; the interim
`ownsOrphanRecovery` flag is deprecated (parsed + warned, no longer load-bearing).
"""
invariant_sources = [
  "docs/plans/issue-139-orphan-recovery.draft.md",
  "src/job-store.ts",
  "src/postgres-job-store-worker.ts",
  "src/async-job-manager.ts",
  "src/config.ts",
  "src/sqlite-driver.ts",
  "src/index.ts",
  "src/flight-recorder.ts",
]
predecessor_plan = "docs/plans/issue-139-orphan-recovery.draft.md"
test_plan = "docs/plans/issue-139-orphan-recovery.test-plan.md"

[decision]
liveness_signal = "per-job jobs.lease_deadline advanced by the owner heartbeat; NOT a gateway_instances read in the sweep predicate"
sweep_predicate = "candidate = status IN ('queued','running') AND (lease_deadline IS NULL OR lease_deadline < db_now) AND (transport <> 'http' OR started_at < db_now - httpJobGrace); the http-grace term is IN the candidate predicate, NOT applied after the terminal write. NULL arm orphans only legacy pre-migration rows. The pid advisory (pid_check) is a per-candidate confirmation applied BEFORE any row is flipped to orphaned."
serialization = "heartbeat UPDATE and sweep UPDATE both target the same jobs rows, so they serialize on the row lock (Postgres READ COMMITTED) and are trivially serial under single-writer sqlite; no advisory lock or SERIALIZABLE required for correctness"
record_complete_guard = "UPDATE ... WHERE id=@id AND status IN ('queued','running','orphaned') so a genuine terminal result always wins over a mistaken orphan"
record_complete_type = "recordComplete.status becomes Exclude<JobStoreStatus,'running'|'queued'>"
fr_reconcile = "a job FR-logged 'orphaned' that later reaches a real terminal state re-emits logComplete (last-writer-wins) so the audit log converges too"
transport_aware_ttl = "instanceLeaseTtlMs default 90000 (6x heartbeat) for the lease; separate httpJobGraceMs default 300000 for no-pid http-transport jobs. recoverStaleJobs takes (leaseTtl, httpJobGrace); grace is enforced in candidate selection, never as a post-orphan correction"
pid_check = "kill(pid,0) is advisory and NEVER vetoing, applied BEFORE the terminal write: for a process-transport candidate with a live same-host pid the sweeper ADVANCES lease_deadline by one leaseTtl (grace) instead of orphaning it; a dead/missing/foreign-host pid falls through to orphaning. Because the grace is one bounded leaseTtl, pid reuse cannot hold a row hostage indefinitely"
evloop_lag_skip = "the heartbeat timer measures its own hrtime scheduling drift; if drift > HEARTBEAT_MS the sweep is skipped this cycle (blocked loop cannot trust its view of others)"
fail_closed = "registerInstance, durable recordStart, AND markRunning bypass safeStoreCall (all three are correctness-critical durable writes): on failure the async request fails and the limiter permit + queued entry are released; recordOutput/recordComplete may stay best-effort; sustained heartbeat failure stops admission and stops sweeping (prefer self-exit over proactive cancel)"
durable_queued = "JobStoreStatus gains 'queued'; recordStart inserts queued + owner_instance + initial lease_deadline; new markRunning(id,{pid}) transitions queued->running and stamps the real pid at launch; recover targets (queued,running); hydration sets exited=false for queued"
dispose_ordering = "AsyncJobManager.dispose(): stop admission, clearInterval all timers, abort/kill active owned jobs and await the terminal writes their close handlers enqueue (drain AFTER the kills, tracked in a Set<Promise>), then deregisterInstance only if no active owned work remains (else let the lease expire); SIGTERM/SIGINT/http-close await dispose BEFORE process.exit"
gateway_instances_table = "retained for observability/GC/role only; NOT read by the sweep predicate"
interim_gate = "[persistence].ownsOrphanRecovery is deprecated once lease recovery lands (parsed + one-time warning, no longer load-bearing) because lease recovery is safe to run from every instance"
mark_orphaned_shim = "keep markOrphanedOnStartup as a DEPRECATED thin shim delegating to recoverStaleJobs; do NOT preserve blanket-sweep semantics on any production path"
with_transaction = "widen sqlite-driver withTransaction to forward the callback return value so the sqlite recover path can return the orphaned-row list"
sqlite_busy = "add PRAGMA busy_timeout in the SqliteJobStore open path + SQLITE_BUSY retry around heartbeat/sweep for the shared-file case"
db_clock = "per-backend DB clock in the lease/sweep SQL (Postgres now(); sqlite strftime('%s','now')), NOT the client new Date()"
reason = """
The blanket sweep is correct only when the store is private to one process. On a
shared store every instance sees the same running rows, so a fresh instance
orphans others' live jobs. Instance-id-only recovery cannot recover an
instance's own jobs after restart (the id changes); pid liveness cannot cover
the no-pid http transport; a cross-table heartbeat read races the sweep under
READ COMMITTED. Moving the liveness signal onto the job row as a fencing lease
makes heartbeat and sweep collide on the same row lock, which is the only
mechanism that is simultaneously correct under Postgres RC, trivially correct
under single-writer sqlite, transport-agnostic, and free of the mid-flight flap.
Everything else (guarded completion, fail-closed admission, durable queued,
bounded dispose) exists to make that lease safe end to end.
"""

