abort the launch and terminalize/release rather than leave a durable row that the
sweep would see as a stale queued row while the process runs untracked. Enforce
the durable-admission gate at BOTH the tool-registration check and each startJob*
site. On N consecutive heartbeat failures: stop admitting, stop sweeping, and
(preferred) self-exit or clearly mark unhealthy so other instances recover this
instance's jobs correctly rather than mid-flight.
"""
