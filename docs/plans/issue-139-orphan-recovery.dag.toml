[[steps]]
id = "recover-stale-jobs"
depends_on = ["queued-to-running-pid-hydration", "fail-closed-admission"]
actor = "assistant"
action = """
Implement recoverStaleJobs across sqlite + pg worker (memory stays no-op). The
transport-aware grace is part of CANDIDATE SELECTION; no row is flipped to
orphaned before grace is applied (the manager cannot un-orphan a flipped row):

Step 1 (manager, when process-transport candidates may be same-host live): the
store exposes a candidate SELECT of expired rows; the manager runs the advisory
kill(pid,0) on same-host process candidates and, for each still-live pid,
ADVANCES that row's lease_deadline by one leaseTtl (grace) instead of letting it
be orphaned. It passes the confirmed-live ids to step 2 as an exclusion set. A
dead/missing/foreign-host pid is not excluded.

Step 2 (store, single guarded statement) orphans only true candidates, with the
http grace IN the predicate:
  UPDATE jobs SET status='orphaned',
      error=COALESCE(error,'owning gateway instance is no longer alive'),
      finished_at=db_now
  WHERE status IN ('queued','running')
    AND (lease_deadline IS NULL OR lease_deadline < db_now)
    AND (transport <> 'http' OR started_at < db_now - httpJobGrace)
    AND id <> ALL(:liveConfirmedIds)
  RETURNING id, correlation_id, cli, owner_principal, transport, pid, http_status;
(If step 1 found no same-host process candidates, liveConfirmedIds is empty and
this collapses to the pure fencing + http-grace sweep.) Per-backend db_now
(Postgres now(); sqlite strftime), NEVER client new Date(); sqlite runs it in one
withTransaction returning the orphaned list. Emit FR logComplete for recovered
rows AND reconcile (a recovered job that later completes re-emits FR logComplete,
last-writer-wins). Run at startup and on an orphanSweepIntervalMs reaper timer;
add gateway_instances GC (last_heartbeat < now - instanceGc). Convert
markOrphanedOnStartup to a deprecated shim delegating to recoverStaleJobs
(single-owner sqlite/memory path).
"""
idempotent = false
validation = """
Tests (memory/sqlite + pg via test:pg): an expired-lease job is orphaned; a
fresh-lease job is NOT; a NULL-lease legacy row is orphaned; an http job past
leaseTtl but within httpJobGrace is NOT orphaned (grace in the predicate, not
post-hoc), and IS after httpJobGrace; a process candidate with a live same-host
pid has its lease_deadline ADVANCED (not orphaned) then orphaned after the extra
leaseTtl; a concurrent heartbeat + sweep leaves a live job running (fencing
serialization); a mistaken orphan followed by completion yields a single terminal
completed with no observable orphaned; FR reconciles; the sweep uses the DB clock
(a clock-skew case fails if new Date() is used). npm run build passes.
"""

