depends_on = ["introduce-job-limiter"]
actor = "assistant"
action = """
Bring direct sync execution under the same host-protection envelope. The branch
at src/index.ts:909-915 must not call executeCli unless a process-provider
permit has been acquired. If the limiter rejects or times out, return the same
