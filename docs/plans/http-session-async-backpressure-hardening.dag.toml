# Implementation plan: harden HTTP MCP session lifecycle and async/sync
# execution backpressure after issue #130.
#
# Goal: prevent HTTP clients, async jobs, and sync fallback paths from driving
# unbounded memory, process, CPU, or provider-request growth. The plan also
# tightens dedup ownership, defines limit failure modes, and adds observability
# so operators can see saturation before the host is unhealthy.

