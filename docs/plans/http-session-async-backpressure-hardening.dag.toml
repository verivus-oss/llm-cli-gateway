[[steps]]
id = "bound-http-session-lifecycle"
depends_on = ["add-limit-config-surface"]
actor = "assistant"
action = """
Add HTTP session lifecycle management in src/http-transport.ts:

  - track createdAt and lastActivityAt per session;
  - enforce max_sessions before creating a new gateway server/transport;
  - update lastActivityAt on every MCP session request;
  - reap sessions idle longer than session_idle_ttl_ms;
  - close transport and gateway server exactly once on reaper, DELETE,
    transport.onclose, and gateway shutdown;
  - return a retryable saturation response when max_sessions is reached.

The reaper must not depend on clients sending DELETE.
"""
idempotent = false
expected_files_touched = [
  "src/http-transport.ts",
  "src/__tests__/http-transport.test.ts",
]
validation = """
HTTP transport tests prove session cap rejection, idle reaping, activity refresh,
timer cleanup, transport.onclose cleanup, DELETE cleanup, and improved /healthz
session metrics.
"""

[[steps]]
id = "introduce-job-limiter"
depends_on = ["add-limit-config-surface"]
actor = "assistant"
action = """
Add a small in-process limiter/queue owned by AsyncJobManager. It must support:

  - global running limit;
  - per-provider running limit;
  - bounded queue length;
  - bounded queue wait timeout;
  - cancel/removal of queued jobs;
  - metrics for running, queued, rejected, timed-out, and saturated state.

The limiter should not spawn a child process or start runApiRequest until it has
capacity. Failure mode for full queues should be deterministic and prompt-free.
"""
idempotent = false
expected_files_touched = [
  "src/async-job-manager.ts",
  "src/__tests__/async-job-manager.test.ts",
]
validation = """
AsyncJobManager tests prove queued process jobs, queued HTTP API jobs, global
limit behavior, per-provider behavior, queue full rejection, queue timeout,
cancellation before start, and metric snapshots.
"""

[[steps]]
id = "route-process-and-http-api-jobs-through-limiter"
depends_on = ["introduce-job-limiter"]
actor = "assistant"
action = """
Move both process jobs and HTTP API jobs behind the limiter:

  - process transport must delay spawnCliProcess until a permit is acquired;
  - HTTP API transport must delay runApiRequest until a permit is acquired;
  - terminal completion, failure, cancellation, and output overflow must release
    permits exactly once;
  - queued jobs must still be persisted/readable as queued or running according
    to the existing job-result contract.
"""
idempotent = false
expected_files_touched = [
  "src/async-job-manager.ts",
  "src/__tests__/async-job-manager.test.ts",
  "src/__tests__/api-request-tools.test.ts",
]
validation = """
Focused tests prove no provider process/API request starts before capacity,
permits release on every terminal path, and existing happy-path jobs still
complete with persisted results.
"""

[[steps]]
