should have bounded length and bounded wait time; completed in-memory jobs
should age out faster than durable store rows.
"""

[security_notes]
threats = [
  "Memory exhaustion DoS from repeated HTTP MCP session initialization without DELETE.",
  "CPU/process-table/provider-capacity DoS from unlimited async CLI/API jobs.",
  "Host protection bypass when sync direct execution uses executeCli outside the async manager.",
  "Cross-principal data exposure if dedup reuses a job created by a different owner principal.",
  "Retry storms if saturated requests fail ambiguously or after partially spawning work.",
]
requirements = [
  "All limit failures must happen before creating a provider process or outbound provider request when possible.",
  "Remote/authenticated dedup identity must include the effective owner principal or be rejected when the caller cannot access the original owner.",
  "Health surfaces must report counts, ages, queue depth, saturation, and process memory without user prompt/output material.",
  "Session idle timers and reaper intervals must be cancelled on explicit close and server shutdown.",
]

