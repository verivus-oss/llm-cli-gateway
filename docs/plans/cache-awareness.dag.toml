depends_on = []
actor = "assistant"
action = """
Survey the actual cache control surfaces exposed by each upstream CLI AND
upstream API. The CLI-surfaced field names differ from the underlying API
field names — distinguish both.

- claude (Anthropic Claude Code CLI):
    * Does `claude -p` accept explicit cache_control / breakpoints via flag,
      stdin JSON, or `--betas` activation? Verify by running `claude --help`
      and reading https://code.claude.com/docs/en/cli-usage.
    * What environment variables affect caching (e.g. ENABLE_PROMPT_CACHING_1H)?
    * Per-model minimum-cacheable token thresholds. Anthropic documents 1024
      tokens for Sonnet 3.5/Opus 3, 2048 for Haiku 3/3.5, and (per recent
      Gemini-reviewer search) 4096 for Haiku 4.5 / Opus 4.5+. Confirm the
      current per-model matrix from
      https://docs.anthropic.com/en/docs/build-with-claude/prompt-caching
      and record it as a table in PROVIDER_CACHE_SURFACES.md.
    * Observable hit fields: cache_read_input_tokens, cache_creation_input_tokens.
- codex (Codex CLI wrapping OpenAI):
    * CLI-emitted field names (per src/codex-json-parser.ts:69-77): the Codex
      CLI emits `cache_read_input_tokens` / `cache_creation_input_tokens`
