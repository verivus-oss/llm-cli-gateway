[[steps]]
id = "define-prompt-parts-schema"
depends_on = []
actor = "assistant"
action = """
In a NEW file src/prompt-parts.ts, define the canonical prompt-parts type,
its Zod schema (so the wiring step can reference it without duplication),
and the pure assemble() function:

  export interface PromptParts {
    system?: string;     // long-lived
    tools?: string;      // long-lived
    context?: string;    // session-lived (e.g. file dumps)
    task: string;        // volatile, per-turn
  }

  export const PromptPartsSchema = z.object({
    system: z.string().optional(),
    tools: z.string().optional(),
    context: z.string().optional(),
    task: z.string().min(1),
  });
  // Exported as a value (not just inferred from z.infer) so it can be
  // composed into tool schemas via .optional() at the call site.

  export function assemble(parts: PromptParts): { text: string; stableByteEnd: number };
    // Concatenates in canonical order (system → tools → context → task),
    // returns the byte offset where the volatile tail begins.
    // Pure function — no I/O, no logging.

The resolvePromptInput() helper (defined in this same file) is the contract
consumed by slice1-wire-prompt-parts-into-request-helpers. Its shape:

  export function resolvePromptInput(input: {
    prompt?: string;
    promptParts?: PromptParts;
  }): {
    assembledPrompt: string;
    stablePrefixHash: string | null;
    stablePrefixTokens: number | null;
  };
  // Caller is responsible for mutual-exclusion check BEFORE calling this
  // (see slice1-wire-prompt-parts-into-request-helpers point 2).
  // When `prompt` is provided: hash/tokens stay null.
  // When `promptParts` is provided: hash = sha256 of bytes[0..stableByteEnd],
  // tokens = simple bytes/4 heuristic for slice 1.
"""
idempotent = true
validation = """
- Unit tests verify: (a) canonical ordering, (b) stableByteEnd is
  byte-accurate for ASCII and multi-byte UTF-8, (c) missing optional parts
  produce stable output, (d) re-invocation with identical parts produces
  byte-identical output.
- PromptPartsSchema is exported and importable; round-tripping via
  PromptPartsSchema.parse(input) for valid inputs returns the typed shape.
- resolvePromptInput contract holds: hash/tokens null when prompt set,
  non-null when promptParts set, both null when neither set (caller
  enforces required-one-of separately).
"""

