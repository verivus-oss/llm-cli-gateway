    * Confirm the CLI threshold and reporting field via `codex exec --help`
      and a smoke test.
- gemini: implicit prefix cache vs explicit cachedContents API, and what the
  CLI surfaces (vs the SDK).
- grok: any cache reporting in CLI output.
- mistral (vibe): any cache reporting in CLI output.

Record findings in docs/personal-mcp/PROVIDER_CACHE_SURFACES.md.
"""
