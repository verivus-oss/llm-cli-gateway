# ---------------------------------------------------------------------------
# Rollback + risks
# ---------------------------------------------------------------------------

[rollback]
guidance = """
Every behavioural change in this slice is gated behind an opt-in flag in
[cache_awareness], all defaulting to false. Rollback options:

1. Soft rollback: set all [cache_awareness] flags to false. Gateway reverts
   to current behaviour. Flight-recorder columns stay populated (harmless).

2. Hard rollback: revert the feature branch. Migration v3 columns remain on
   existing logs.db files but are NULL for new rows — non-destructive, no
   re-migration needed.

3. Config corruption: delete the [cache_awareness] block from config.toml;
   defaults apply (everything off).

Do NOT roll back by dropping the v3 columns. SQLite has supported
ALTER TABLE DROP COLUMN since 3.35.0 (2021-03-12), so the operation is
technically available, but it rewrites the table internally and is unsafe
on a live WAL database with concurrent readers without closing the DB.
The columns are cheap to keep — leaving them as NULL on rollback is the
safer path.
"""

[risks]
known = [
  "Anthropic CLI may not expose cache_control injection; slice1-claude step has a documented fallback to prefix-discipline-only.",
  "stable_prefix_hash on legacy rows is NULL forever; cache-stats queries must tolerate this and not divide by zero.",
  "ttlRemainingMs is best-effort — we observe writes via flight-recorder, not the provider's actual cache state. A cache eviction inside Anthropic's window will not be visible to us; the warning may be optimistic.",
  "Pricing table in src/pricing.ts goes stale; estimatedSavingsUsd is an estimate, not a billing number.",
]
mitigations = [
  "All new behaviour gated behind opt-in flags.",
  "All new queries use COALESCE / explicit NULL handling.",
  "ttlRemainingMs documented as 'best effort, computed locally' in resource description.",
  "Pricing data carries a `priced_as_of` date field and doctor surfaces age.",
]
