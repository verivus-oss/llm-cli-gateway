id = "phase-6-acp-cursor-first-class-surface"
phase = "acp"
status = "planned"
description = """
Promote Cursor ACP support from smoke-only coverage to a full first-class
runtime surface. ACP must be a production-grade path that exposes the same
functional capabilities users expect from Cursor Agent, including
model/mode configuration, session load/new, prompt streaming, permission
mediation, cancellation, workspace/cwd semantics, MCP approval behavior, and
Cursor extension methods. Do not silently ignore ACP fields; implement the
documented Cursor ACP contract and fail closed only on verified upstream
contract drift with an explicit capability error object.
"""
dependencies = ["phase-2-live-cursor-model-discovery", "phase-5-cursor-output-normalization"]
expected_files_touched = [
  "src/acp/transport.ts",
  "src/acp/provider-registry.ts",
  "src/acp/types.ts",
  "src/index.ts",
  "src/__tests__/acp-transport-wiring.test.ts",
  "src/__tests__/acp-provider-registry.test.ts",
  "src/__tests__/acp-smoke-harness.test.ts",
]
acceptance_criteria = [
  "ACP is available as a first-class cursor_request transport when cursor-agent acp is present and authenticated.",
  "ACP session config options for model and mode are parsed, represented, and settable through gateway request fields.",
  "ACP supports session/new and session/load, and maps gateway session intent to Cursor ACP session semantics without confusing gw-* tracking ids with Cursor chat ids.",
  "ACP session/prompt streams normalized assistant output, tool events, stop reasons, and errors.",
  "ACP permission requests route to approval manager and return allow-once, allow-always, or reject-once with timeout/cancel handling.",
  "cursor/ask_question and cursor/create_plan are handled as blocking methods with typed responses.",
  "cursor/update_todos, cursor/task, and cursor/generate_image are handled as notifications and represented in structuredContent/events.",
  "ACP session/cancel integrates with llm_job_cancel and process cleanup.",
  "ACP MCP server behavior is explicit: use Cursor-owned .cursor/mcp.json, expose approval behavior, and never claim request-time MCP injection is active unless implemented and tested.",
  "ACP smoke proves initialize, authenticate or pre-authenticated flow, session/new, model/mode config, session/prompt, permission handling, and session/cancel on the installed Cursor CLI.",
]
verification_commands = [
  "npx vitest run src/__tests__/acp-transport-wiring.test.ts src/__tests__/acp-provider-registry.test.ts src/__tests__/acp-smoke-harness.test.ts",
]

