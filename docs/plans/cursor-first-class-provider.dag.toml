# Implementation plan: full-featured first-class Cursor provider integration.
#
# Purpose:
#   Make Cursor Agent a complete first-class gateway provider, not a bolted-on
#   request handler. Every documented Cursor Agent CLI and ACP capability must
#   have a deliberate gateway behavior: request execution, live model discovery,
#   sessions, output/event parsing, MCP management, worktrees, plugins, workers,
#   auth/status/about diagnostics, resources, capability inventory,
#   upstream-contract checks, validation/review tooling, docs, and runtime
#   smoke tests.
#
# Scope:
#   This is a production-grade full-integration spec. It is intentionally
#   broader than "add models://cursor" because the required outcome is a
#   complete provider surface with no second-class Cursor paths.

