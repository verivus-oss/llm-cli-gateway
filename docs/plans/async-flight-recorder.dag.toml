# Implementation plan: async-path flight-recorder integration + codex parser fix.
#
# Goal: close the two telemetry gaps that v1.6.0 (cache-awareness phase 1)
# explicitly deferred. After this slice:
#   1. *_request_async tools write rows to the flight recorder with
#      stable_prefix_hash / stable_prefix_tokens populated (same shape as the
#      sync path), so cache_state://* aggregates include async-job activity.
#   2. Codex CLI's actual `cached_input_tokens` field is parsed, so the
#      cache_read_tokens column starts populating on codex rows.
#
# Out of scope for this slice (gated on this slice's data):
#   - Slice 4 (cache-aware multi-LLM routing) — needs 24h+ of clean
#     cache_state://global data first; see cache-awareness.dag.toml comments.
#   - Slice 5 (explicit Claude cache_control via stream-json — Branch A) —
#     separate plan; requires human-in-the-loop live smoke test.
#
# Invariant preserved: "No conversation content in session storage"
# (project-root CLAUDE.md). The new FR writes go to the existing flight
# recorder (~/.llm-cli-gateway/logs.db, which already stores prompts/responses
# for audit), NOT to the session manager.

