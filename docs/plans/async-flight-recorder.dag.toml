# Rollback + risks
# ---------------------------------------------------------------------------

[rollback]
guidance = """
This slice has no opt-in flag — the new FR writes are always on for new
async jobs once the wiring lands. Rollback options:

1. Hard rollback: revert the feature branch (or the release commit). FR
   migration schema is unchanged from v1.6.x (no v4 migration), so revert
   is non-destructive. Async-job rows written between release and revert
   stay in logs.db with valid shape; nothing has to be cleaned up.

2. Targeted disable (no flag): if a bug in the async-path writes is
   discovered post-release, the safest fix is forward — patch the
   writeFlightComplete helper or the startJob log site to no-op until
   the bug is fixed. The infrastructure (CapturingFlightRecorder tests,
   etc.) supports rapid iteration.

There is no schema migration to roll back. The FR table shape is
unchanged.
"""

[risks]
known = [
  "AsyncJobManager closure retention — flightRecorderEntry + extractUsage live on the in-memory record. R2 Codex-F5 / Gemini-F3 fix: closure constructed from primitive locals only (not from `params`), and both fields cleared after the terminal write so the GC can reclaim them well before JOB_TTL_MS eviction.",
  "JobStore.markOrphanedOnStartup signature change is a breaking change at the TypeScript interface level. PostgresJobStore is interface-only today; SqliteJobStore + MemoryJobStore + their tests (job-store.test.ts:256, persistence-config.test.ts:348) are updated in this slice. No external implementers are known.",
  "Cancel-as-failed (and orphan-as-failed) in the FR: external consumers of `~/.llm-cli-gateway/logs.db` that filter `status='failed'` will count cancels and boot orphans as errors. cache-stats does not currently distinguish, so internal aggregation is unaffected. The JobStore retains the distinct 'canceled' / 'orphaned' statuses for getJobSnapshot callers.",
  "Sync-deferred-dedup orphan rows (R2 Codex-F1 known limitation): when a sync request hits dedup AND the sync deadline expires, the dedup'd caller's correlationId row stays at status='started' forever (manager only writes complete for the original job's corrId). Documented in CHANGELOG.",
  "Codex parser change is a one-line behaviour shift. If a hypothetical Codex build emits both cached_input_tokens AND cache_read_input_tokens with different values, the new code prefers the newer name. This is the safer choice (newer CLI is canonical) but is a behaviour change.",
]
mitigations = [
  "Closure-retention risk neutralised by primitive-locals closure construction (Codex-F5 fix) plus explicit field-clear post-write.",
  "JobStore interface change rollout includes test updates and a single-file stub for PostgresJobStore.",
  "Cancel/orphan-as-failed semantics documented in ASYNC_FLIGHT_RECORDER_SURFACES.md and CHANGELOG.",
  "Sync-deferred-dedup orphan documented as a known limitation; future slice can address via per-request corrId fan-out.",
  "Codex parser dual-field test pins the priority ordering and surfaces any future ambiguity in CI.",
]
