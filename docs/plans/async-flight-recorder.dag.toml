Extend AsyncJobManager to accept a FlightRecorderLike dependency and an
optional usage parser per job:

1. src/async-job-manager.ts — constructor:
     constructor(
       logger: Logger = noopLogger,
       onJobComplete?: (cli, durationMs, success) => void,
       store: JobStore | null = null,
       flightRecorder: FlightRecorderLike = new NoopFlightRecorder()
     )
   Defaulting to NoopFlightRecorder is critical: every existing test that
   constructs an AsyncJobManager without injecting a recorder keeps working
   unchanged, and the cumulative test count must not drop.

2. src/async-job-manager.ts — extend StartJobOptions with:
     /**
      * Slice 1.5: data needed to write a flight-recorder row mirroring the
      * sync path's safeFlightStart entry. When omitted (legacy callers,
      * tests that don't supply a prep), no FR write is performed at start
      * and the complete write is also suppressed (no orphaned start row).
      *
      * R2 Codex-F1 / Codex-F5 fix: shape decomposed to primitive fields
      * (no nested object pinning), and a separate `writeFlightStart` flag
      * controls whether AsyncJobManager INSERTs a logStart row. Callers
      * whose upstream already wrote logStart (the sync path's
      * awaitJobOrDefer) must pass writeFlightStart=false to avoid a
      * primary-key collision on requests.id.
      */
     writeFlightStart?: boolean;        // default false (back-compat)
     flightRecorderEntry?: {
       model: string;
       prompt: string;                  // assembled effective prompt
       sessionId?: string;
       stablePrefixHash?: string;
       stablePrefixTokens?: number;
     };
     /**
      * Slice 1.5: callback to extract token usage from terminal stdout for
      * the FR complete write. Called only on `completed` (exitCode === 0).
      * Returns null/undefined fields when usage cannot be extracted.
      * AsyncJobManager does NOT import extractUsageAndCost itself to avoid
      * an index.ts ↔ async-job-manager.ts circular dependency — callers
      * supply the closure.
      *
      * R2 Codex-F5 / Gemini-F3 fix: callers MUST construct the closure
      * from primitive locals only, never by capturing `params` directly.
      * Pattern:
      *     const fmt = params.outputFormat;
      *     const cliName = "claude";
      *     const extractUsage = (stdout: string) =>
      *       extractUsageAndCost(cliName, stdout, fmt);
      * The closure is cleared from the AsyncJobRecord after the terminal
      * write to release retained references inside its scope.
      */
     extractUsage?: (stdout: string) => {
       inputTokens?: number;
       outputTokens?: number;
       cacheReadTokens?: number;
       cacheCreationTokens?: number;
       costUsd?: number;
     };

3. src/async-job-manager.ts — extend the legacy positional `startJob(...)`
   signature to ALSO take optional `flightRecorderEntry`, `extractUsage`,
   and `writeFlightStart` trailing params (after `onComplete`). All
   existing call sites stay working by omitting them. The new dedup-aware
   `startJobWithDedup(..., opts)` reads them from `opts`.

4. Persist flightRecorderEntry + extractUsage on the in-memory
   AsyncJobRecord so the close/error/idle-timeout/overflow handlers can
   reach them at terminal time. After writeFlightComplete fires, clear
   both fields (`job.flightRecorderEntry = undefined; job.extractUsage =
   undefined`) so retained references can be GC'd before the JOB_TTL_MS
   eviction window (Codex-F5 fix).
   Reconstituted (hydrated-from-store) records do NOT get an extractUsage
   (the in-process closure is lost) — their FR write was made by the
   prior process and is already complete.

5. src/index.ts — thread the new fields through every async handler
   (handle*RequestAsync, 5 functions). Each builds the
   flightRecorderEntry from its existing `prep` object, extracts
   primitives BEFORE building the extractUsage closure (Codex-F5 fix), and
