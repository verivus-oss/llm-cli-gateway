[[steps]]
id = "wire-flight-complete-on-terminal"
depends_on = ["wire-flight-start-on-startjob"]
actor = "assistant"
action = """
In AsyncJobManager, add a private helper. The shape below incorporates
R2 fixes for Codex-F2 (failure payload mirrors sync helpers), Codex-F4
(guard set only on successful write so retries from interleaved terminal
callbacks can recover from a thrown logComplete), and Codex-F5 (clear
retained fields after the terminal write):

  private writeFlightComplete(
    job: AsyncJobRecord,
    finalStatus: "completed" | "failed",
    overrideErrorMessage?: string,
  ): void {
    if (!job.flightRecorderEntry) return;   // never opted in, skip
    if (job.flightRecorderComplete) return; // already wrote successfully
    const durationMs = Math.max(0, Date.now() - new Date(job.startedAt).getTime());
    const usage =
      finalStatus === "completed" && job.extractUsage
        ? this.safeExtractUsage(job)
        : {};

    // R2 Codex-F2: mirror sync-path failure payload semantics. On non-zero
    // exit `job.error` is often null; fall back to stderr / "Exit code N".
    // On clean exit, response = stdout. On failure, response = stderr ||
    // stdout (stderr is where the useful text lives on launch errors).
    const isFailure = finalStatus === "failed";
    const response = isFailure ? job.stderr || job.stdout : job.stdout;
    const exitCode = job.exitCode ?? (finalStatus === "completed" ? 0 : 1);
    const errorMessage = isFailure
      ? overrideErrorMessage ?? job.error ?? job.stderr ?? `Exit code ${exitCode}`
      : undefined;

    try {
      this.flightRecorder.logComplete(job.correlationId, {
        response,
        durationMs,
        retryCount: 0,
        circuitBreakerState: "closed",
        optimizationApplied: false,
        exitCode,
        errorMessage,
        status: finalStatus,
        inputTokens: usage.inputTokens,
        outputTokens: usage.outputTokens,
        cacheReadTokens: usage.cacheReadTokens,
        cacheCreationTokens: usage.cacheCreationTokens,
        costUsd: usage.costUsd,
      });
      // R2 Codex-F4: only mark complete on SUCCESSFUL write. If the call
      // threw, leave the flag false so a later terminal callback can retry.
      // The FR's WHERE status='started' guard makes the retry a safe
      // no-op once the first write eventually lands.
      job.flightRecorderComplete = true;
      // R2 Codex-F5: clear retained references so GC can collect anything
      // captured by extractUsage's closure before JOB_TTL_MS eviction.
      job.flightRecorderEntry = undefined;
      job.extractUsage = undefined;
    } catch (err) {
      this.logger.error("Async-path flight recorder logComplete failed", err);
    }
  }

  private safeExtractUsage(job: AsyncJobRecord) {
    try {
      return job.extractUsage?.(job.stdout) ?? {};
    } catch (err) {
      this.logger.error(`Job ${job.id} extractUsage threw`, err);
      return {};
    }
  }

Add to AsyncJobRecord:
  flightRecorderEntry?: StartJobOptions["flightRecorderEntry"];
  extractUsage?: StartJobOptions["extractUsage"];
  flightRecorderComplete?: boolean;   // set ONLY on successful logComplete

Call writeFlightComplete from EVERY terminal-state code path:
  - close handler → "completed" if exitCode === 0 && !canceled, else "failed"
  - error handler → "failed" (launch failure: stderr already mirrored from launchError.message at lines ~594-610)
  - idle timeout → "failed", overrideErrorMessage from job.error which the timeout cb set to the inactivity message
  - output overflow → "failed", overrideErrorMessage="Output exceeded maximum size (50MB)"
  - cancelJob → "failed", overrideErrorMessage="canceled by caller"
  - evictCompletedJobs dead-process branch → "failed", overrideErrorMessage="Process no longer exists (dead process detected)"
  - evictCompletedJobs exited-mismatch branch → "failed", overrideErrorMessage="Process exited without proper status transition"

For markOrphanedOnStartup (R2 Codex-F3 / Mistral-F1 fix — orphan rows
need enough data for a useful logComplete):

  - Extend JobStore.markOrphanedOnStartup() to return:
      {
        count: number;
        orphaned: Array<{
          id: string;
          correlationId: string;
          startedAt: string;
          stdout: string;
          stderr: string;
          exitCode: number | null;
        }>;
      }
    (Sqlite + Memory + Postgres impls.) Update existing tests:
    `src/__tests__/job-store.test.ts:256` and
    `src/__tests__/persistence-config.test.ts:348` — both currently
    assert `.toBe(<number>)`; switch to `.count`.

  - SqliteJobStore impl: SELECT id, correlation_id, started_at, stdout,
    stderr, exit_code FROM jobs WHERE status='running' INTO an array,
    THEN UPDATE (same SQL as today). No transaction wrapper needed (the
    DatabaseLike interface lacks one; gateway boot is single-threaded
    before any new jobs arrive, so the SELECT-then-UPDATE race window is
    closed). This avoids R2 Gemini-F4 (no DatabaseLike.transaction change
    required).

  - MemoryJobStore impl: collect rows where status==='running' before
    flipping them.

  - AsyncJobManager constructor: for each orphan, call
    this.flightRecorder.logComplete(orphan.correlationId, {
      response: orphan.stderr || orphan.stdout,
      durationMs: Math.max(0, Date.now() - new Date(orphan.startedAt).getTime()),
      retryCount: 0,
      circuitBreakerState: "closed",
      optimizationApplied: false,
      exitCode: orphan.exitCode ?? 1,
      errorMessage: "orphaned after gateway restart",
      status: "failed",
    }). Wrap in try/catch. The underlying UPDATE has WHERE status='started'
    so it silently no-ops when no FR row exists (e.g. pre-1.7.0 async
    jobs that never wrote a logStart).

Cancel decision: write FR complete with status="failed",
errorMessage="canceled by caller". Rationale documented in
ASYNC_FLIGHT_RECORDER_SURFACES.md (audit trail value outweighs the
status-encoding loss; JobStore retains the distinct 'canceled' status
for getJobSnapshot callers).

Single-shot guard rationale (R2 Codex-F4 fix applied above): the flag
is set ONLY after a successful logComplete write. The flag's purpose is
to skip cheap-but-redundant calls from interleaved terminal callbacks
in the common case; the FR's `WHERE status='started'` UPDATE guard is
the actual idempotency mechanism (so a thrown write CAN be retried by
the next terminal callback, which is the correctness-critical property).
"""
