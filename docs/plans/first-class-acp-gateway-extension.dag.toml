# Implementation specification: first-class ACP gateway extension.
#
# Scope:
#   Add Agent Client Protocol (ACP) as a first-class, optional provider
#   transport behind llm-cli-gateway's existing MCP server. MCP remains the
#   inbound client protocol. ACP is used to talk to provider agents that expose
#   an ACP process, starting with read-only smoke and then gated runtime pilots.
#
# Acronym note:
#   This plan targets Agent Client Protocol, the JSON-RPC protocol used by
#   editors/clients to communicate with coding agents. It does not target
#   agent-to-agent "Agent Communication Protocol" work unless a provider CLI
#   explicitly documents that meaning later.

[meta]
name = "first-class ACP gateway extension"
schema_version = "1.1"
owner = "verivus-oss"
slice = "first-class-acp-gateway-extension-2026-06-12"
target_branch = "master"
release_version = "UNSET - assign at ship time"
predecessor_plan = "docs/plans/acp-provider-transport-research.dag.toml"
predecessor_report = "docs/research/2026-06-12-acp-provider-transport-feasibility.md"
acceptance_resource = "llm-cli-gateway exposes ACP capability metadata, validates native ACP process health for supported providers, and can route gated Mistral and Grok request flows through ACP without changing the default CLI transport or weakening current MCP safety boundaries."
invariant_sources = [
  "docs/plans/acp-provider-transport-research.dag.toml",
  "docs/research/2026-06-12-acp-provider-transport-feasibility.md",
  "docs/upstream/release-targets.md",
  "src/index.ts",
  "src/resources.ts",
  "src/provider-tool-capabilities.ts",
  "src/upstream-contracts.ts",
  "src/session-manager.ts",
  "src/async-job-manager.ts",
  "src/approval-manager.ts",
  "src/workspace-registry.ts",
  "src/worktree-manager.ts",
  "src/request-helpers.ts",
  "src/executor.ts",
  "src/flight-recorder.ts",
  "src/provider-status.ts",
  "src/config.ts",
  "src/doctor.ts",
]

[decisions]
protocol_target = "Agent Client Protocol"
mcp_frontend_remains = true
acp_is_internal_provider_transport_first = true
outbound_acp_frontend_deferred = true
cli_request_tools_remain_stable = true
default_transport = "cli"
acp_transport_requires_config_gate = true
no_direct_provider_acp_exposure = true
no_arbitrary_provider_subcommands = true
request_tools_get_optional_transport_selector = true
provider_capabilities_report_acp_support = true
provider_contracts_track_acp_entrypoints = true
read_only_smoke_before_runtime = true
manual_smoke_is_not_runtime_support = true
host_services_required_before_write_capable_prompt = true
permission_callbacks_route_through_approval_manager = true
provider_native_sessions_are_not_gateway_sessions = true
gateway_session_ids_remain_gateway_owned = true
adapter_mediated_support_deferred = true
vibe_first_then_grok = true
agy_watchlist = true
release_must_preserve_existing_cli_behavior = true

[non_goals]
replace_mcp_server = "The gateway remains an MCP stdio server for clients."
ship_outbound_acp_server = "Serving llm-cli-gateway itself as an ACP agent is a separate later design."
wrap_every_provider_immediately = "Only native ACP providers enter runtime pilots in this slice."
run_adapter_mediated_providers_by_default = "Claude and Codex adapters are tracked but not shipped as runtime support until adapter ownership, install, and safety are resolved."
grant_write_or_terminal_services_by_default = "ACP HostServices start with deny-by-default read-only behavior."
expose_raw_acp_json_rpc = "Agents continue using gateway MCP tools and resources, not provider-specific JSON-RPC calls."

[architecture]
inbound_protocol = "MCP over stdio"
internal_acp_transport = "JSON-RPC over provider stdio"
primary_flow = "MCP client -> llm-cli-gateway MCP tool -> provider request router -> ACP client/host layer -> provider ACP agent"
fallback_flow = "If ACP is disabled, unavailable, unsupported, or unhealthy, request tools use the existing CLI transport unless the caller explicitly required ACP."
stdout_rule = "Gateway stdout remains reserved for MCP JSON-RPC. Provider ACP stdout is consumed only by the ACP transport and never forwarded to gateway stdout as logs."
runtime_gate = "ACP runtime routing is disabled unless gateway config enables ACP and enables the provider."

[architecture.module_plan]
root = "src/acp/"
types = "Zod-backed ACP protocol schemas, JSON-RPC envelope types, and provider-neutral TypeScript types."
json_rpc_stdio = "Line-delimited JSON-RPC process transport with request correlation, notification handling, timeout handling, process-exit handling, and stderr capture."
client = "High-level ACP client for initialize, session/new, session/load, session/prompt, session/cancel, and host callback dispatch."
process_manager = "Spawn, kill, restart, idle-timeout, cwd, env, and health lifecycle management for provider ACP processes."
host_services = "Gateway-owned ACP HostServices implementation for filesystem, terminal, MCP, and permission surfaces."
provider_registry = "Provider-specific ACP entrypoint metadata, target versions, availability checks, and runtime support status."
smoke_harness = "Read-only initialize plus session/new validation used by doctor, tests, and optional public diagnostics."
session_map = "Mapping between gateway session rows and provider ACP session IDs without reusing provider IDs as gateway IDs."
event_normalizer = "Conversion from ACP session/update events into gateway response, async-job, and resource shapes."
errors = "Typed ACP errors with redacted user-facing messages and detailed debug metadata for stderr logs."

