terminal = "disabled"
permissions = "deny write and command execution"
mcp = "disabled or allowlisted read-only diagnostics"
purpose = "allow provider ACP agents to inspect workspace files without mutations."

[[host_services.phases]]
id = "phase-2-permission-bridge"
filesystem = "workspace-scoped read-only plus approved writes if config allows"
terminal = "disabled by default"
permissions = "ApprovalManager mediated"
mcp = "allowlisted"
