[rollout]
phase_0 = "Capability metadata and read-only smoke only; no prompt routing."
phase_1 = "Mistral ACP runtime pilot behind global and provider config gates."
phase_2 = "Grok ACP runtime pilot behind global and provider config gates."
phase_3 = "Async-job parity, provider resources, and agent-facing docs."
