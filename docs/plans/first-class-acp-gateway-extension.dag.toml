[open_questions]
provider_process_reuse = "Should ACP provider processes be per request, per gateway session, per workspace, or pooled by provider/workspace?"
host_filesystem_contract = "Which ACP filesystem methods are required by vibe-acp and grok agent stdio before prompt routing is useful?"
permission_granularity = "Can provider permission callbacks be mapped cleanly to existing ApprovalManager request types, or is a new approval kind needed?"
streaming_shape = "Which ACP session/update variants need to map to current sync responses versus async job logs?"
adapter_install_story = "Should adapter-mediated providers ever be bundled, discovered, or left entirely user-installed?"
default_transport_future = "What evidence would justify changing provider defaults from cli to acp?"

[[steps]]
id = "freeze-contract-and-non-goals"
depends_on = []
actor = "assistant"
action = """
Freeze the extension contract before implementation:

  - MCP remains the client-facing gateway protocol.
  - ACP is an internal provider transport.
  - Existing request tools keep CLI behavior by default.
  - Native ACP support is separate from adapter-mediated support.
  - HostServices side effects are deny-by-default until permission bridging is
    implemented and tested.

Record the decisions in docs and in provider capability metadata.
"""
idempotent = true
validation = """
Spec, implementation notes, and docs all use Agent Client Protocol terminology
consistently and state that Agent Communication Protocol is out of scope. No
new public tool exposes raw ACP JSON-RPC.
"""

[[steps]]
id = "add-acp-config-schema"
depends_on = ["freeze-contract-and-non-goals"]
actor = "assistant"
action = """
Extend gateway configuration with an [acp] section and provider-specific ACP
settings. Add Zod validation for:

  - global enabled flag,
  - default transport,
  - smoke and prompt timeouts,
  - idle timeout,
  - allow_write_host_services,
  - allow_terminal_host_services,
  - per-provider command and args,
  - per-provider runtime_enabled flag.

Reject shell strings that require parsing. Store commands as executable plus
argv array only.
"""
idempotent = false
validation = """
Unit tests cover default config, explicit disabled config, provider override
config, invalid default transport, invalid timeout, and rejected shell-style
entrypoint strings. Existing config tests continue to pass.
"""

[[steps]]
id = "extend-provider-capability-metadata"
depends_on = ["add-acp-config-schema"]
actor = "assistant"
action = """
Extend provider_tool_capabilities with an ACP section for every provider:

  - status,
  - native versus adapter-mediated classification,
  - target version,
  - entrypoint,
  - runtimeEnabled,
  - smokeSupported,
  - smokeStatus,
  - caveats,
  - docs reference.

Keep agy explicit: target Antigravity agy 1.0.7 has no ACP surface, even
though legacy Gemini CLI evidence exists elsewhere.
"""
idempotent = false
validation = """
provider_tool_capabilities tests assert all five CLI providers have ACP fields.
Codex and Claude are adapter_mediated_deferred, agy is absent_watchlist,
Mistral and Grok are native candidates, and no adapter is labeled native.
"""

[[steps]]
id = "track-acp-upstream-contracts"
depends_on = ["extend-provider-capability-metadata"]
actor = "assistant"
action = """
Add ACP-specific upstream contract checks without changing request argv
allowlists:

  - vibe-acp --version and --help probe metadata,
  - grok agent stdio --help probe metadata,
  - agy absence/watchlist evidence,
  - codex and claude native absence evidence,
  - adapter evidence as documentation only.

Keep these probes safe and read-only.
"""
idempotent = false
validation = """
npm run upstream:contracts passes offline. Live probe mode reports ACP
entrypoint drift separately from request-tool command drift.
"""

[[steps]]
id = "build-json-rpc-stdio-transport"
depends_on = ["track-acp-upstream-contracts"]
actor = "assistant"
action = """
Implement src/acp/json-rpc-stdio.ts:

  - spawn-safe stdio wiring is supplied by process_manager,
  - newline-delimited JSON-RPC parsing,
  - response correlation by id,
  - notification dispatch,
  - error response handling,
  - request timeouts,
  - process-exit propagation to pending requests,
  - stderr forwarding through the gateway logger,
  - no console.log or stdout logging.
"""
idempotent = false
validation = """
Focused unit tests simulate fragmented messages, batched pending requests,
notifications, JSON-RPC errors, invalid JSON, timeout, and process exit. Tests
prove no gateway stdout writes occur.
"""

[[steps]]
id = "define-acp-protocol-types"
depends_on = ["build-json-rpc-stdio-transport"]
actor = "assistant"
action = """
Implement src/acp/types.ts with Zod schemas and explicit TypeScript return
types for the ACP methods required by this slice:

  - initialize,
  - session/new,
  - session/load if needed for resume,
  - session/prompt,
  - session/cancel,
  - session/update notifications,
  - permission callbacks,
  - minimal HostServices requests.

Prefer tolerant parsing for provider-specific metadata while keeping required
fields strict.
"""
idempotent = false
validation = """
Schema tests cover valid Mistral and Grok smoke responses captured from local
validation, missing required fields, provider-specific extra fields, and
unknown notification variants.
"""

[[steps]]
id = "implement-acp-client-core"
depends_on = ["define-acp-protocol-types"]
actor = "assistant"
action = """
Implement src/acp/client.ts as the protocol wrapper used by gateway code:

  - initialize once per process,
  - create or load ACP sessions,
  - send prompts,
  - cancel prompts,
  - surface updates through callbacks,
  - dispatch provider calls back into HostServices,
  - normalize errors into gateway error classes.

The client must not know provider-specific spawn commands.
"""
idempotent = false
validation = """
Mock-agent integration tests prove initialize/session-new/session-prompt flows
work through the client and that protocol errors become structured gateway
errors with redacted messages.
"""

[[steps]]
id = "add-acp-process-manager"
depends_on = ["implement-acp-client-core"]
actor = "assistant"
action = """
Implement src/acp/process-manager.ts:

  - resolve provider entrypoints from config and provider registry,
  - spawn without shell,
  - set cwd to the resolved workspace or safe temp directory,
  - apply minimal environment inheritance,
  - support provider-specific isolation such as Grok leader socket isolation,
  - enforce initialize and idle timeouts,
  - kill processes on gateway shutdown,
  - quarantine crashed processes until recreated.
"""
idempotent = false
validation = """
Tests assert argv is passed without shell parsing, cwd is controlled,
provider-specific env isolation can be applied, idle timeout kills the process,
and crashed process state is reported to callers.
"""

[[steps]]
id = "add-read-only-smoke-harness"
depends_on = ["add-acp-process-manager"]
actor = "assistant"
action = """
Implement src/acp/smoke-harness.ts and wire it to doctor/capability reporting.
The smoke must do only:

  - spawn provider ACP process,
  - initialize,
  - session/new in a disposable workspace or safe temp cwd,
  - capture protocolVersion and agentInfo,
  - terminate the process.

Do not send prompts, do not expose filesystem services, and do not request
terminal access in the smoke path.
"""
idempotent = false
validation = """
Mock smoke tests pass. Installed-provider smoke tests are opt-in and skip when
vibe-acp or grok is missing. Doctor reports last smoke status without leaking
account IDs, credential paths, temp paths, or raw JSON-RPC payloads.
"""

[[steps]]
id = "define-host-services-boundary"
depends_on = ["add-read-only-smoke-harness"]
actor = "assistant"
action = """
Implement the HostServices skeleton with deny-by-default behavior:

  - filesystem read methods are unavailable until phase 1,
  - filesystem write methods are denied,
  - terminal methods are denied,
  - permission requests are denied until ApprovalManager bridge exists,
  - MCP host calls are unavailable unless allowlisted.

Make unsupported HostServices requests visible to the provider as denied or
unsupported responses, not process crashes.
"""
idempotent = false
validation = """
Provider callback tests prove every side-effect-capable host request is denied
by default and that denial is returned through valid ACP JSON-RPC.
"""

[[steps]]
id = "implement-permission-bridge"
depends_on = ["define-host-services-boundary"]
actor = "assistant"
action = """
Bridge ACP permission callbacks to ApprovalManager:

  - map provider permission request type, target path/command, and summary to
    an approval request,
  - preserve provider and gateway session context,
  - deny on timeout or malformed request,
  - record approval decisions in existing audit surfaces,
  - keep write and terminal approvals disabled unless config allows the host
    service category.
"""
idempotent = false
validation = """
Tests cover approve, deny, timeout, malformed permission request, disabled
write service, disabled terminal service, and audit event creation.
