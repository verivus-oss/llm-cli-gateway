# Least-Cost Routing (LCR) implementation plan.
# Machine plan derived from the cross-LLM-approved spec
# docs/plans/least-cost-routing.draft.md. Data-first: every step is idempotent
# and carries a concrete validation. Dormant by default (mirrors [acp]).
# Folds in the six cost-estimation enhancements (Grok+Mistral approved): a
# derived-cost path (composeCost, cost_basis), per-family accountingMode
# (inclusive|disjoint), modelIdToFamily pricing, a layered token-estimator,
# input-token self-calibration + confidence bands, and transport-scoped grok.

[meta]
name = "least-cost-routing"
schema_version = "1.2"
owner = "gateway-maintainers"
slice = "least-cost-routing"
target_branch = "feat/least-cost-routing"
release_version = "UNSET"
predecessor_plan = "docs/plans/least-cost-routing.draft.md"
acceptance_resource = "routing://decisions"
invariant_sources = [
  "src/pricing.ts",
  "src/provider-definitions.ts",
  "src/provider-types.ts",
  "src/provider-status.ts",
  "src/retry.ts",
  "src/executor.ts",
  "src/api-provider.ts",
  "src/async-job-manager.ts",
  "src/flight-recorder.ts",
  "src/cache-stats.ts",
  "src/config.ts",
  "src/index.ts",
  "src/validation-orchestrator.ts",
  "src/optimizer.ts",
  "src/acp/runtime.ts",
]

# ---------------------------------------------------------------------------
# Decisions (flat flags; the frozen shape of the design)
# ---------------------------------------------------------------------------
[decisions]
routing_unit = "candidate"                 # a (provider, model) pair, never a bare provider
dormant_by_default = true                  # [least_cost].enabled defaults false; tools unregistered when off
surface = "dedicated_tool"                 # new route_request; NOT a param on existing per-provider tools
existing_tools_unchanged = true
pricing_source_of_truth = "src/pricing.ts" # extend, never a second price table
getPricing_unchanged = true                # ZERO-for-unknown stays for the cache-savings path
router_price_accessor = "getModelCost"     # new accessor; unknown => exclude, never ZERO-wins
api_price_source = "published_catalog"     # OpenRouter/xAI catalog rates; NEVER decompose a total costUsd
estimate_uses = "ranking_and_budget"       # two estimates: shared ranking vs conservative budget bound
budget_gate = "fail_closed"
selection = "deterministic_argmin"         # no Math.random/Date.now in the ranker
quality_floor = "config_tier"              # economy|standard|frontier; caller minTier default standard
priors = "model_level_economics"           # anonymized; not per-principal cost history
priors_scope_default = "global"            # global|principal|off
dispatch = "reuse_existing_path"           # startJob / runApiRequest; LCR selects inputs, does not fork execution
default_transport_change = "deferred"      # provider:"auto" selector is a later plan, like ACP default_transport
cost_basis_on_every_figure = true          # provider-reported | derived-from-tokens | pre-flight-estimate (enh 1)
derived_cost_path = "counts_times_rate"    # T2 providers: total from reported counts x getModelCost rate, NEVER decompose a scalar costUsd
accounting_mode_split = "per_family"       # inclusive (OpenAI-style) vs disjoint (Anthropic-style) cache accounting (round-1 blocker 2)
compose_cost_single_impl = true            # one pure composeCost() implements derive AND rank so the mode branch can't drift
price_by_resolved_family = "modelIdToFamily" # getModelCost prices the resolved model family, not the CLI brand (round-1 blocker 3; cursor/devin)
token_estimator = "layered_calibrated"     # content-aware base + per-tokenizer-family multiplier + flight-recorder self-calibration (enh 2+3)
grok_tier = "transport_scoped"             # grok-ACP=T2 (counts already threaded), grok-`-p`=T4 estimate-only, xAI-api=T1 (round-1 blocker 1)
confidence_band = "advisory_not_ranking"   # enh 5: reported as min(cost_basis, band); never re-orders argmin

# ---------------------------------------------------------------------------
# Non-goals (key = reason)
# ---------------------------------------------------------------------------
[non_goals]
not_a_load_balancer = "LCR optimizes cost, not throughput; latency/saturation are eligibility inputs, not the objective."
not_billing_accurate = "No real tokenizer exists; pre-flight numbers rank candidates, they are never invoices."
no_automatic_quality_arbitration = "LCR never routes below the caller minTier to save money."
no_override_of_explicit_provider = "claude_request still goes to claude; LCR is reached only through its own tool."
no_new_provider_lists = "All enumeration derives from CLI_TYPES + enabledApiProviders(); provider:surfaces:check enforces it."
not_cross_instance = "Routing decisions are local to one gateway instance."
no_costUsd_rate_decomposition = "A single total costUsd cannot be split into input/output rates; catalog prices are used instead."

# ---------------------------------------------------------------------------
# Architecture + module plan (maps spec section 9)
# ---------------------------------------------------------------------------
[architecture]
summary = "A pure selector (least-cost-router.ts) reads price (pricing.ts/getModelCost + composeCost), a layered content-aware token estimate (token-estimator.ts), capability (provider-definitions.ts), auth (provider-status.ts) and health (retry/executor breaker accessor + getLimiterSnapshot) to pick argmin(estCost) subject to eligibility+tier+budget, then dispatches through the existing handler path. Every cost figure carries a cost_basis (provider-reported | derived-from-tokens | pre-flight-estimate) and confidence. Dormant behind [least_cost]."

[architecture.module_plan]
pricing = "src/pricing.ts: add getModelCost (output + cache-write pricing, accountingMode inclusive|disjoint, resolved family via modelIdToFamily, source/asOf, unknown=exclude) + a pure composeCost(counts|null, estimate, modelCost) yielding {costUsd, cost_basis, confidence}. getPricing untouched."
token_estimator = "src/token-estimator.ts (NEW): layered content-aware estimator (content-type char base + per-tokenizer-family multiplier + calibration k hook); replaces optimizer.estimateTokens on the routing path only."
breaker_accessor = "src/executor.ts + src/retry.ts: export per-CLI breaker state (map CliType->executable first); add per-provider capacity helper over getLimiterSnapshot(). NOTE: async CLI jobs spawn via spawnCliProcess and bypass the executor breaker map (it is sync executeCli history only), so the router treats CLI health as breaker-state for the sync path PLUS the per-provider capacity helper and async-job outcomes for the async path; it does not assume the breaker reflects async failures."
capability_flags = "src/provider-definitions.ts: promote image/attachment, tool-calling, json-schema to explicit requestSurface flags (additive, DRY, surfaces-check-safe)."
router_core = "src/least-cost-router.ts (NEW): pure pool-build + eligibility + estimator + deterministic ranker + budget gate. No CLI spawn; unit-testable like computeFlagDrift."
feedback = "src/lcr-priors.ts (NEW, read-only sibling of cache-stats.ts): anonymized per-(provider,model) output-token median/p90 + input-token calibration k (per content-type,family) + residual spread (confidence) + est-vs-actual reconciliation split by cost_basis."
config = "src/config.ts: [least_cost] Zod schema + loadLeastCostConfig (throw on schema-invalid, all-off default), threaded through runtime."
tools = "src/index.ts: register route_request / route_request_async behind the gate; dispatch via existing path; add routing block; add routing:// resources; extend llm_process_health."
flight_recorder = "src/flight-recorder.ts: additive migration for routed/route_est_cost_usd/route_est_confidence/route_reason/route_considered/route_reroutes + request-wide cost_basis; logComplete derived-cost backfill for T2 rows."
parser_wiring = "src/index.ts extractUsageAndCost (~:2045): route T2 captured counts through composeCost; fix the stale 'ACP usage not wired' comment (~:2138-2143). Grok ACP reasoningTokens capture + Anthropic-API cache_creation extraction land in phase_2b."

# ---------------------------------------------------------------------------
# Cost-model matrix (per-provider+transport price source, telemetry tier,
# cache-accounting mode, and cost basis; SoT is spec section 4.1a. Grounds
# which providers are LCR-eligible in which phase and how their cost is obtained.
# telemetry_tier: T1 reports $cost, T2 reports token counts (cost is DERIVED),
# T3 transport-conditional, T4 no usage (pre-flight estimate only).
# accounting_mode: inclusive (OpenAI-style, input includes cache-read) vs
# disjoint (Anthropic-style, input is fresh-only + cache-read billed).
# ---------------------------------------------------------------------------
[cost_model.claude]
price_source = "table"
telemetry_tier = "T1"
reported_cost = "reliable"          # total_cost_usd in stream-json result
accounting_mode = "disjoint"        # input_tokens is FRESH only; cache_read billed, not subtracted (4.1a)
basis = "provider-reported"
usage = "input/output/cache_read/cache_write"
lcr_phase = "phase_1"

[cost_model.codex]
price_source = "table"
telemetry_tier = "T2"
reported_cost = "rare_null"         # codex JSONL rarely emits cost_usd => cost DERIVED from counts
accounting_mode = "inclusive"
basis = "reported_if_present_else_derived"
usage = "input/output/cache_read/cache_write"
lcr_phase = "phase_1"

[cost_model.gemini]
price_source = "table"
telemetry_tier = "T2"
reported_cost = "none"              # no $cost; token counts present => cost DERIVED (enh 1)
accounting_mode = "inclusive"
basis = "derived-from-tokens"
usage = "input/output/cache_read"
lcr_phase = "phase_1"

[cost_model.grok]
price_source = "table"
telemetry_tier = "T2_acp__T4_cli"   # transport-conditional (round-1 blocker 1)
reported_cost = "transport_scoped"  # grok-`-p` emits NO usage (T4); grok-ACP _meta counts ARE already threaded (runtime.ts:262-266) => DERIVED (T2)
accounting_mode = "inclusive"
basis = "acp_derived_else_estimate"  # reasoningTokens currently DROPPED by extractAcpPromptUsage (enh 4 captures it)
usage = "acp_meta_only"             # ACP: input/output/cache_read (+reasoningTokens); -p wire: none
lcr_phase = "phase_1_estimate__phase_2b_derived"  # priced+eligible in phase_1 on estimate; ACP-derived cost lands in phase_2b

[cost_model.mistral]
price_source = "table"
telemetry_tier = "T1"
reported_cost = "sometimes"         # off-disk vibe meta.json when found; else derived/estimate
accounting_mode = "inclusive"       # no cache terms
basis = "provider-reported"
usage = "input/output"
lcr_phase = "phase_1"

[cost_model.devin]
price_source = "resolved_family"    # NO src/pricing.ts brand branch; priced via modelIdToFamily(resolved model) (round-1 blocker 3), else unknown
telemetry_tier = "T4"
reported_cost = "none"
accounting_mode = "per_resolved_family"
basis = "pre-flight-estimate"       # always estimate (no counts), confidence: low (enh 6)
usage = "none"
lcr_phase = "estimate_only"         # eligible only if resolved family is priced; via explicit candidates + allow_unpriced when unknown

[cost_model.cursor]
price_source = "resolved_family"    # cursor-agent --model runs claude/gpt/...; price the resolved family, not the brand (round-1 blocker 3)
telemetry_tier = "T4"
reported_cost = "none"
accounting_mode = "per_resolved_family"
basis = "pre-flight-estimate"       # always estimate, confidence: low (enh 6)
usage = "none"
capability_scope = "maintain-only"
lcr_phase = "estimate_only"

[cost_model.api_providers]
price_source = "api_catalog"        # OpenRouter /models prompt/completion prices; xAI published rates
telemetry_tier = "T1_or_T2"         # xAI Responses = T1; OpenRouter with usage.cost = T1, without = T2 (derived)
reported_cost = "when_enabled"      # OpenRouter usage accounting / xAI; reconciliation + derive
accounting_mode = "inclusive"
basis = "reported_or_derived"
usage = "varies"
lcr_phase = "phase_2"

# ---------------------------------------------------------------------------
# Config (mirrors [acp] dormancy)
# ---------------------------------------------------------------------------
[config]
block = "[least_cost]"
loader = "loadLeastCostConfig"
missing_block = "all_off_defaults"
syntactically_broken_toml = "whole_file_fallback_to_defaults"
schema_invalid = "throw"
env_overrides = "one_time_deprecation_warning_only"

[config.example]
least_cost = """
[least_cost]
enabled = false
min_tier = "standard"
max_cost_usd = 0.50
default_expected_output_tokens = 800
budget_output_safety_factor = 1.5
priors_scope = "global"            # global | principal | off
allow_unpriced = false
max_reroutes = 2
prefer_catalog_price = true

[least_cost.tiers]                 # (provider:family) -> tier; a default ships for every known family
"claude:haiku" = "economy"
"claude:sonnet" = "standard"
"claude:opus" = "frontier"

[least_cost.candidates]
allow = []                         # empty = all eligible
deny = []
"""

# ---------------------------------------------------------------------------
# API surface
# ---------------------------------------------------------------------------
[api_surface]
new_tools = ["route_request", "route_request_async"]
existing_tools_touched = "none"
inputs = "prompt|promptParts, candidates?, minTier?, maxCostUsd?, maxOutputTokens?, expectedOutputTokens?, requiredCapabilities?, allowUnpriced?, budgetWaiver? (explicit acknowledgment to admit an unpriced/over-budget fallback), fallback?, optimizePrompt?, plus common passthroughs"
output_extra = "routing block: {chosen{provider,model}, tier, estCostUsd, costBasis, confidence, nearTie, estInputTokens, estOutputTokens, priceAsOf, priceSource, consideredCount, rejected[{candidate,reason}], reroutes}"
validation_tool_optin = "validate_with_models/second_opinion/ask_model MAY gain select:'cheapest'|'cheapest_per_tier' (default behavior unchanged)"

[resources]
"routing://decisions" = "recent routing decisions, redacted, read-only, gated behind enabled"
"routing://priors" = "current per-candidate output-token priors + input-token calibration k (+ sample count/quality) + price asOf, read-only, gated"

# ---------------------------------------------------------------------------
# Security + correctness invariants (flat true flags)
# ---------------------------------------------------------------------------
[security_invariants]
deterministic_selection = true
principal_attribution_isolated = true
priors_are_anonymized_model_economics = true
unknown_price_never_wins = true
unpriced_cannot_pass_budget_gate = true
budget_fails_closed = true
no_silent_quality_downgrade = true
honest_cost_labeling = true
routing_block_and_logs_redacted = true
getPricing_semantics_unchanged = true
dormant_by_default = true
no_hand_maintained_provider_arrays = true
cost_basis_labeled_on_every_figure = true    # enh 1
no_scalar_costUsd_decomposition = true       # derive total from counts x rate; never split a scalar total into rates
derived_cost_upgrades_recorded_row = true    # T2 rows backfilled to derived-from-tokens post-hoc
confidence_is_advisory_not_ranking = true    # enh 5; argmin over point estimates only
calibration_is_anonymized_model_level = true # input-token k keyed by (content-type, resolved family), never per principal

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
[observability]
flight_recorder_columns = ["routed", "route_est_cost_usd", "route_est_confidence", "route_reason", "route_considered", "route_reroutes", "cost_basis"]
metrics = "per-(provider,model): estimate-vs-actual accuracy split BY cost_basis, win counts, reroute rate, output-token priors, input-token calibration k (+ sample count/residual spread), catalog-price asOf freshness"
resources = ["routing://decisions", "routing://priors"]
doctor = "surface pricing.asOf staleness + per-provider telemetry tier (T1-T4) + per-candidate eligibility (priced? authed? breaker? tier?) + per-(content-type,family) calibration quality (k, samples, confidence) + untiered models"
redaction = "reuse flight-recorder redaction: no secrets, no base_url userinfo, no raw prompts in health surfaces"

[flight_recorder_requirements]
migration = "additive, nullable columns on gateway_metadata incl route_est_confidence + request-wide cost_basis (matches existing additive-migration pattern)"
derived_backfill = "logComplete backfills cost_usd + cost_basis='derived-from-tokens' for T2 rows (codex/gemini) from recorded counts x getModelCost/composeCost; T1 rows keep provider-reported"
reconciliation = "actual cost_usd/output_tokens/model already recorded; reconciliation splits accuracy by cost_basis"

# ---------------------------------------------------------------------------
# Failure policy (spec section 10)
# ---------------------------------------------------------------------------
[failure_policy]
missing_or_broken_config = "all_off, log once, tools not registered (no partial routing)"
all_candidates_unpriced = "NoEligibleCandidate by default; with allow_unpriced still requires explicit budget waiver, else fail closed"
empty_eligible_pool = "NoEligibleCandidateError naming why each candidate was excluded (auth/breaker/capability/price/tier/budget)"
transient_failure = "re-select over remaining eligible candidates up to max_reroutes; failed candidate excluded"
non_transient_failure = "drop candidate, continue; empty pool => NoEligibleCandidateError"
health_accessor_unavailable = "treat as CLOSED, log degraded-health warning, do not crash routing"

# ---------------------------------------------------------------------------
# Test matrix
# ---------------------------------------------------------------------------
[test_matrix.unit]
pricing = "getModelCost: output+cache-write pricing, accountingMode + resolved family (modelIdToFamily) fields, source/asOf, unknown=exclude; getPricing ZERO-for-cache-path unchanged (regression); modelIdToFamily maps cursor/devin resolved model ids to a priced family, unknown id => 'unknown'."
compose_cost = "composeCost basis matrix: provider-reported passthrough; derived-from-tokens with inclusive vs disjoint formulas (disjoint bills cache_read, inclusive subtracts the discount); pre-flight-estimate; unknown-rate => estimate + low-confidence flag; reasoningTokens added at output rate. Same pure fn drives derive AND rank (no branch drift)."
token_estimator = "layered token-estimator.ts: content-type classifier (prose/code/CJK char bases), per-tokenizer-family multiplier, calibration factor k applied when present (defaults to 1); deterministic over fixture text; layer-1 floor when no data."
estimator = "ranking estimate is mode-aware (inclusive vs disjoint) via composeCost; budget estimate uses conservative upper bound; unbounded output => budget gate fails."
eligibility = "auth/breaker/capacity/capability/tier/price filters, each mocked; untiered => excluded."
ranker = "deterministic argmin + tie-break stable across runs (no Math.random/Date.now)."
budget = "over-budget => BudgetExceededError; unpriced => cannot pass gate without explicit waiver."
calibration_confidence = "aggregator: input-token k=median(actual/base) per (content-type,family), residual p10/p50/p90, confidence label mapping (n>=30 & p90:p10<=1.5 => high, etc.); confidence composes as min(cost_basis, band) and never re-orders argmin; disjoint fresh-only counts reconstructed, mistral session-continued rows excluded."
priors = "anonymized model-level aggregate; priors_scope principal/off honored; no cross-principal leakage."
config = "loadLeastCostConfig: missing=all-off, schema-invalid=throw, env override warns once."

[test_matrix.integration]
gated_off = "with enabled=false, route_request/route_request_async are NOT registered."
gated_on = "with enabled=true, a table-priced CLI request routes to the cheapest tier-eligible candidate and records the routing columns incl cost_basis; a T2 (codex/gemini) route's cost is upgraded to derived-from-tokens on completion."
surfaces = "provider:surfaces:check passes (no new hand-maintained provider array)."

# ---------------------------------------------------------------------------
# Release gates
# ---------------------------------------------------------------------------
[release_gates]
build = "npm run build"
lint = "npm run lint (0 errors)"
format = "prettier --check (use ./node_modules/.bin/prettier; npx is RTK-proxied)"
surfaces = "npm run provider:surfaces:check"
tests = "npm test (full suite green)"
security_audit = "npm run security:audit"
cross_llm_review = "unconditional Codex + Grok + Gemini approval on the diff, evidence-based"
docs = "agent-facing docs updated (below)"

[agent_docs_required]
best_practices = "docs/guides/BEST_PRACTICES.md: when to use route_request vs a specific provider tool"
skill = ".agents/skills/*: least-cost routing usage (minTier/maxCostUsd/candidates), unpriced/budget semantics"
contract = "docs/least-cost-routing-contract.md: frozen decisions + non-goals + security invariants"

# ---------------------------------------------------------------------------
# Rollout (spec section 12)
# ---------------------------------------------------------------------------
[rollout]
phase_0 = "getModelCost + composeCost (enh 1) + modelIdToFamily + layered token-estimator.ts (enh 3, content-aware base + family multipliers, NO calibration yet) + per-CLI breaker accessor + per-provider capacity helper + explicit capability flags + pure least-cost-router.ts + unit tests. No tool yet."
phase_1 = "route_request/route_request_async behind [least_cost].enabled=false; CLI providers with table prices only; routing block (incl costBasis + confidence); flight-recorder columns incl cost_basis + route_est_confidence; derived-cost backfill on logComplete for T2 providers already emitting counts (codex, gemini); T4 confidence:low for cursor/devin (enh 6)."
phase_2 = "API-provider candidates priced from published catalogs + feedback aggregator (output priors AND input-token calibration k + residual spread feeding the calibrated estimator and confidence band, enh 2/5) + est-vs-actual reconciliation split by cost_basis + routing:// resources."
phase_2b = "enh 4 (corrected): capture the dropped reasoningTokens in extractAcpPromptUsage + add it to the derived formula; make LCR transport-aware for grok (derive cost only via the operator-gated ACP transport, estimate-only on -p; never flip the ACP default on); extract cache_creation_input_tokens in the Anthropic-API adapter so its disjoint derived cost is complete. Small, isolated, own gate."
phase_3 = "validation-tool select:'cheapest' opt-in; doctor/health eligibility + telemetry-tier + calibration-quality surfacing (enh 5); reconciliation reporting. Optional real-BPE tokenizer layer (enh 3, open question) is a candidate slice here if adopted."
phase_4 = "DEFERRED (needs a new plan): provider:'auto' selector on per-provider tools and/or default_route. Mirrors ACP default_transport deferral."

# ---------------------------------------------------------------------------
# Open questions (spec section 11)
# ---------------------------------------------------------------------------
[open_questions]
output_prior_cold_start = "Ship per-family output-token defaults, or require a warm-up window of N samples before trusting a candidate prior?"
tier_authority = "Are shipped tier assignments sufficient, or should tiers derive from a public benchmark reference kept in provider-definitions later?"
api_model_discovery = "Does the API candidate pool come from a caller/config allow-list only, or a periodic /models catalog fetch (later phase)?"
unpriced_cli_providers = "devin/cursor have no src/pricing.ts brand branch AND no usage telemetry; getModelCost prices them via modelIdToFamily(resolved model) when it maps to a priced family (estimate x that rate, confidence:low), else 'unknown' => excluded unless explicit candidates + allow_unpriced + budget waiver (enh 6). grok is NOT in this group: it is table-priced (src/pricing.ts GROK_4/GROK_BUILD) and phase_1 eligible on estimate; its ACP _meta counts are already threaded so it yields DERIVED cost when routed via the gated ACP transport (phase_2b), estimate-only on -p. Confirm the devin/cursor modelIdToFamily fallback."
estimate_drift_threshold = "What est-vs-actual accuracy threshold (now split by cost_basis) triggers a price/prior refresh or an operator warning?"
real_bpe_tokenizer = "Ship the calibrated heuristic only, or add an OPTIONAL gpt-tokenizer-style exact layer for the OpenAI family (a new prod dep the shrinkwrap/Socket/tarball gates scrutinise)? Proposed: heuristic+calibration by default; exact layer is an opt-in slice, never a default dependency."
calibration_cold_start = "How many samples per (content-type,family) bucket before the estimator trusts a learned k over the layer-1/2 default? Proposed: a minimum sample count; below it, confidence:low and the base estimate stands."
modelIdToFamily_completeness = "How complete must modelIdToFamily be, and what is the fallback when cursor/devin do not surface a resolvable model id at all? Proposed: treat as 'unknown' (excluded by default)."

# ===========================================================================
# Steps (dependency-ordered; each idempotent with a concrete validation)
# ===========================================================================

[[steps]]
id = "freeze-contract"
depends_on = []
actor = "implementer"
action = """
Write docs/least-cost-routing-contract.md capturing the cross-LLM-approved frozen
decisions, non-goals, and security invariants from the draft (house frozen-contract
style, like docs/acp-contract.md). Reference this DAG.
"""
idempotent = true
validation = "docs/least-cost-routing-contract.md exists, lists the [decisions], [non_goals], and [security_invariants] of this plan, and points at this DAG."

[[steps]]
id = "extend-pricing-getmodelcost"
depends_on = ["freeze-contract"]
actor = "implementer"
action = """
In src/pricing.ts add a NEW router-only getModelCost(provider, model): ModelCost
with { inputUsdPerMTok, outputUsdPerMTok, cacheReadMultiplier, cacheWriteUsdPerMTok
(default = inputUsd; Anthropic ~1.25x), accountingMode: "inclusive"|"disjoint" (enh 1,
round-1 blocker 2), family: string (resolved pricing family),
source: "table"|"api-catalog"|"unknown", asOf }. Add a CLI-agnostic
modelIdToFamily(model) and price by the RESOLVED family, NOT the CLI brand
(round-1 blocker 3): getPricing has no cursor/devin branch, but they run other
families' models, so getModelCost maps the resolved model id to a family and prices
that. Also add a single pure composeCost(counts | null, estimate, modelCost) ->
{ costUsd, cost_basis, confidence } (enh 1) that yields provider-reported
(passthrough), derived-from-tokens (counts x rate, branching on accountingMode:
inclusive subtracts the cache-read discount, disjoint bills cache_read on fresh-only
input, adds reasoningTokens at the output rate), or pre-flight-estimate; the forbidden
scalar-total decomposition never appears. NEVER derive rates from a total costUsd.
Unknown family/catalog => source "unknown" (router excludes it). DO NOT change
getPricing or estimateCacheSavingsUsd (their ZERO-for-unknown semantics stay for
cache-stats).
"""
idempotent = true
validation = "Unit test: getModelCost returns table rates for known families incl outputUsd, cacheWrite, accountingMode, and resolved family; modelIdToFamily maps a cursor/devin resolved model id to a priced family and an unknown id => 'unknown'; unknown model => source 'unknown'; getPricing still returns ZERO for unknown (regression unchanged). composeCost basis matrix: provider-reported passthrough, derived inclusive vs disjoint (disjoint bills cache_read, inclusive subtracts the discount), reasoningTokens added at output rate, unknown-rate => estimate+low-confidence, one pure fn drives derive AND rank. npm test green for pricing.test.ts."

[[steps]]
id = "export-cli-breaker-accessor"
depends_on = ["freeze-contract"]
actor = "implementer"
action = """
In src/executor.ts/src/retry.ts export a per-CLI circuit-breaker state accessor
(parity with apiProviderBreakerState). Breakers are keyed by resolved
command/executable (e.g. cursor -> cursor-agent), so the accessor maps CliType to
its executable before lookup. Do not change breaker behavior.
"""
idempotent = true
validation = "Unit test: accessor returns CLOSED/OPEN/HALF_OPEN for a CliType by mapping to its executable; matches the internal breaker Map. No _request handler still needs to hardcode 'closed' for the router path."

[[steps]]
id = "capacity-helper"
depends_on = ["freeze-contract"]
actor = "implementer"
action = """
Add a per-provider capacity helper deriving saturation from
getLimiterSnapshot().runningByProvider vs maxRunningPerProvider (there is no
per-provider saturated field; the global saturated flag is only a coarse gate).
"""
idempotent = true
