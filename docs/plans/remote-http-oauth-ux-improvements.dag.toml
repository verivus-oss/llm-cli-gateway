[[nodes]]
id = "phase-2-diagnostics-readiness-projection"
phase = "diagnostics"
status = "planned"
description = """
Add a stable remote_http_oauth readiness projection to doctor JSON and the
setup status schema. The projection should combine existing endpoint exposure,
HTTP transport, OAuth config, OAuth metadata URL, client registration, and
workspace readiness checks into a small decision tree.

The readiness projection is not an auth decision. Runtime auth and workspace
gating remain in the existing HTTP/OAuth/workspace code paths.
"""
dependencies = ["phase-1-documentation-and-message-contract"]
expected_files_touched = [
  "src/doctor.ts",
  "src/config.ts",
  "src/oauth.ts",
  "src/workspace-registry.ts",
  "setup/status.schema.json",
  "src/__tests__/doctor.test.ts",
  "src/__tests__/config.test.ts",
  "src/__tests__/workspace-registry.test.ts",
]
acceptance_criteria = [
