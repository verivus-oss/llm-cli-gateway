version: 2

# Dependabot scope (matches the verivus-oss/agent-assurance posture):
# - github-actions: pinned by SHA org-wide; weekly bumps keep us current
#   with the upstream maintainer's latest tag → SHA mapping.
# - npm: the gateway's primary runtime + devDeps + test fixtures. Weekly
#   updates keep semver-compatible bumps flowing without manual chasing.
# - pip: the integrations/llm-plugin/ surface that ships to PyPI, plus
#   the hashed CI tool requirements used by workflow bootstrap steps.
#
# Security-only mode is NOT enabled — we want all updates (security +
# version) so the toolchain stays current. The gateway's dep surface
# is narrow, so weekly PR volume is expected to be low (the npm group
# below collapses semver minor/patch bumps into a single PR; security
# updates always come through individually so they're never delayed by
# a grouped batch).

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(npm)"
    labels:
      - "dependencies"
      - "npm"
    # Group non-security version bumps into a single PR; let security
    # updates come through individually so they're never delayed.
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/integrations/llm-plugin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(pip)"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/.github/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(ci-pip)"
    labels:
      - "dependencies"
      - "python"
      - "github-actions"
