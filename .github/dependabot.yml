version: 2

# Dependabot scope (matches the verivus-oss/agent-assurance posture):
# - github-actions: pinned by SHA org-wide; weekly bumps keep us current
#   with the upstream maintainer's latest tag → SHA mapping.
# - npm: the gateway's primary runtime + devDeps + test fixtures. Weekly
#   updates keep semver-compatible bumps flowing without manual chasing.
# - pip: the hashed CI tool requirements used by workflow bootstrap steps.
#   The CI tool requirements intentionally live outside .github/ and keep
#   requirements-*.txt names so both Dependabot updates and Dependency Graph
#   ingestion see them.
#
# Security-only mode is NOT enabled — we want all updates (security +
# version) so the toolchain stays current. The gateway's dep surface
# is narrow, so weekly PR volume is expected to be low (the npm group
# below collapses semver minor/patch bumps into a single PR; security
# updates always come through individually so they're never delayed by
# a grouped batch).

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps(npm)"
    labels:
      - "dependencies"
      - "npm"
    # Group non-security version bumps into a single PR; let security
    # updates come through individually so they're never delayed.
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    # Socket-flagged releases the security audit hard-fails (blocklist in
    # scripts/release-security-audit.sh) — Dependabot must not keep
    # proposing them (PR #32 bumped type-is to 2.1.0; the audit rejected it
    # by design, and 2.1.0 additionally depends on the equally-flagged
    # content-type ^2.0.0). Ignore EXACTLY the flagged versions so any
    # future clean release (e.g. a type-is 2.1.1) still surfaces for
    # review; the audit blocklist remains the hard gate either way.
    ignore:
      - dependency-name: "type-is"
        versions: ["2.1.0"]
      - dependency-name: "content-type"
        versions: ["2.0.0"]
      # body-parser 2.3.0 transitively pulls the flagged type-is 2.1.0 +
      # content-type 2.0.0; the direct ignores above do not stop a parent
      # package from re-introducing them, so the npm-minor-patch group PR
      # kept recurring and failing the packed-consumer audit (PRs
      # #24 / #110 / #118 / #120). Ignore the exact flagged body-parser
      # version; a later release resolving to clean type-is/content-type
      # still surfaces for review, and the audit blocklist stays the hard gate.
      - dependency-name: "body-parser"
        versions: ["2.3.0"]

  - package-ecosystem: "pip"
    directory: "/requirements/ci"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(ci-pip)"
    labels:
      - "dependencies"
      - "python"
      - "github-actions"
