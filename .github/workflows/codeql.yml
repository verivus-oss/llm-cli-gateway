name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "26 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      # Keep this aligned with the maintained source surfaces. The retired
      # PyPI llm plugin was removed in v1.15.3, so Python is no longer a
      # CodeQL target for this repository.
      matrix:
        language: [javascript-typescript, go]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
