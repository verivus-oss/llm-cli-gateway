name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only on the GITHUB_TOKEN. Every job below either reads
# the working tree, builds, lints, or runs tests — none push commits,
# create issues, or write release artifacts. Future jobs that need write
# access should declare permissions at the job level rather than
# loosening this top-level default. Caught by zizmor (excessive-permissions).
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Job-level permissions match the workflow default explicitly — zizmor
    # flags ambiguous-inheritance otherwise.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Wipe the auth token from .git/config after checkout so it
          # cannot be picked up by later steps (zizmor artipacked).
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:fuzz
      - name: Run test:ci with process diagnostics
        run: |
          set -Eeuo pipefail

          dump_processes() {
            local label="$1"
            echo "::group::process diagnostics: ${label}"
            date -u
            echo "shell pid=$$ ppid=$PPID"
            ps -eo pid,ppid,pgid,sid,stat,comm,args | sed -n '1,220p'
            echo "::endgroup::"
          }

          on_signal() {
            local signal="$1"
            echo "::error::test:ci wrapper received ${signal}"
            dump_processes "after ${signal}"
            exit 128
          }

          trap 'on_signal TERM' TERM
          trap 'on_signal INT' INT
          trap 'dump_processes EXIT' EXIT

          dump_processes "before test:ci"
          trace_prefix="${RUNNER_TEMP:-/tmp}/vitest-signal-trace"
          rm -f "${trace_prefix}"*

          set +e
          if command -v strace >/dev/null 2>&1; then
            setsid --wait strace -ff -tt -o "${trace_prefix}" \
              -e trace=kill,tgkill,tkill,rt_sigqueueinfo,rt_tgsigqueueinfo \
              -e signal=all \
              npm run test:ci
          else
            echo "::warning::strace not available; running test:ci without syscall tracing"
            setsid --wait npm run test:ci
          fi
          test_status=$?
          set -e
          echo "test:ci exited with status ${test_status}"
          if compgen -G "${trace_prefix}*" >/dev/null; then
            echo "::group::signal syscall trace"
            for trace_file in "${trace_prefix}"*; do
              echo "--- ${trace_file}"
              grep -E "SIG|kill|tgkill|rt_sigqueueinfo|rt_tgsigqueueinfo" "${trace_file}" || true
            done
            echo "::endgroup::"
          fi
          dump_processes "after test:ci"
          exit "${test_status}"
      # security:audit gates on npm-shrinkwrap.json presence + parity; the
      # shrinkwrap is generated, never committed (it would break npm ci).
      - run: node scripts/make-prod-shrinkwrap.mjs
      - run: npm run security:audit

  pack-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "npm"
      - run: npm ci
      - run: npm run build
      # Generate the prod-only shrinkwrap so the packed contents match what
      # an actual publish ships (it is generated, never committed).
      - run: node scripts/make-prod-shrinkwrap.mjs
      - name: Verify npm pack contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          if grep -E '^npm notice [0-9]' pack-output.txt | grep -qE 'src/|node_modules/|__tests__'; then
            echo "ERROR: Unwanted files in npm tarball"
            exit 1
          fi
      - name: Verify server starts
        run: |
          timeout 5 node dist/index.js < /dev/null 2>/dev/null || true
          echo "Server startup smoke test passed"
