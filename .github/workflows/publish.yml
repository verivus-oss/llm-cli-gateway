name: Publish llm-cli-gateway plugin to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Declaring `permissions:` shrinks GITHUB_TOKEN to ONLY the listed
      # scopes, so `contents: read` must be explicit for actions/checkout to
      # fetch the release tag. Without it, checkout retries on auth failure
      # and the job exits with `fatal: could not read Username`.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Drop the auth token from .git/config after checkout (zizmor
          # artipacked). PyPI publishing uses OIDC, not git credentials.
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --require-hashes -r requirements/ci/requirements-publish.txt

      - name: Verify package version matches tag
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PYPI_VERSION=$(python - <<'PY'
          import tomllib
          with open("integrations/llm-plugin/pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PYPI_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: integrations/llm-plugin/pyproject.toml version ($PYPI_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build package
        working-directory: integrations/llm-plugin
        run: rm -rf dist && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: integrations/llm-plugin/dist/
