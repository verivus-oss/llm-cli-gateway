name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Drop the auth token from .git/config after checkout (zizmor
          # artipacked). `npm publish` uses NODE_AUTH_TOKEN, not git
          # credentials, so this is safe.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6 # zizmor: ignore[cache-poisoning]
        # Why the ignore: zizmor's cache-poisoning audit flags setup-node
        # on any `release: published` trigger regardless of whether cache
        # is enabled. We do NOT set `cache:` here — no cache is read or
        # written — so the attack vector (poisoned cache restored during
        # publish) does not exist. The ignore is targeted and the rationale
        # is documented inline.
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run build
      - run: npm run security:audit

      - name: Verify package version matches tag
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish (dry run)
        if: inputs.dry-run == 'true'
        run: npm publish --dry-run --ignore-scripts

      - name: Publish
        if: inputs.dry-run != 'true'
        run: npm publish --ignore-scripts
