name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Drop the auth token from .git/config after checkout (zizmor
          # artipacked). `npm publish` uses NODE_AUTH_TOKEN, not git
          # credentials, so this is safe.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6 # zizmor: ignore[cache-poisoning]
        # Why the ignore: zizmor's cache-poisoning audit flags setup-node
        # on any `release: published` trigger regardless of whether cache
        # is enabled. We do NOT set `cache:` here — no cache is read or
        # written — so the attack vector (poisoned cache restored during
        # publish) does not exist. The ignore is targeted and the rationale
        # is documented inline.
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Fetch npm publish token from Azure Key Vault
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          AZURE_KEY_VAULT_NPM_TOKEN_SECRET_NAME: ${{ vars.AZURE_KEY_VAULT_NPM_TOKEN_SECRET_NAME }}
        run: node .github/scripts/fetch-azure-keyvault-secrets.mjs NODE_AUTH_TOKEN="${AZURE_KEY_VAULT_NPM_TOKEN_SECRET_NAME}"

      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run build

      # The prod-only npm-shrinkwrap.json is generated, never committed (a
      # committed one is treated as the authoritative lockfile and breaks
      # every `npm ci`/dev install — no dev deps in it). It must exist
      # before the security audit (presence + parity gate) and before
      # pack/publish (ships in the tarball; pins registry consumers'
      # transitive resolution).
      - run: node scripts/make-prod-shrinkwrap.mjs

      - run: npm run security:audit

      # Strip internal MCP server names from the build, THEN verify the packed
      # tarball is clean. This runs as an explicit step (NOT a package.json
      # lifecycle hook) because publish below uses `--ignore-scripts`, which would
      # skip any prepack/prepare hook. It is positioned after security:audit
      # (whose internal `npm run build` is the last dist rebuild) and before
      # pack/publish, so no rebuild re-introduces the names before publish.
      - name: Strip internal MCP names from dist
        run: node scripts/strip-internal-mcp.mjs

      - name: Verify no internal MCP names in the packed tarball
        run: node scripts/verify-no-internal-mcp.mjs

      - name: Verify package version matches tag
        if: github.event_name == 'release'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify npm auth (dry run)
        if: ${{ inputs['dry-run'] }}
        run: |
          # A dry-run against the real version still fails once that version is
          # already published, so exercise auth and publish permissions against
          # a throwaway prerelease in an isolated temp copy instead.
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          rsync -a --exclude .git ./ "${tmpdir}/"
          dry_run_version="$(node -p "const p=require('./package.json'); p.version + '-dryrun.' + process.env.GITHUB_RUN_ID")"
          node - "${tmpdir}" "${dry_run_version}" <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const dir = process.argv[2];
          const version = process.argv[3];

          for (const rel of ["package.json", "npm-shrinkwrap.json"]) {
            const file = path.join(dir, rel);
            const json = JSON.parse(fs.readFileSync(file, "utf8"));
            if (typeof json.version === "string") {
              json.version = version;
            }
            if (json.packages && json.packages[""] && typeof json.packages[""].version === "string") {
              json.packages[""].version = version;
            }
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          NODE
          npm publish --dry-run --ignore-scripts --tag dry-run "${tmpdir}"

      - name: Publish
        if: ${{ !inputs['dry-run'] }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # A prerelease (x.y.z-<id>.<n>) must NOT take the `latest` dist-tag, or a
          # plain `npm install llm-cli-gateway` would resolve to the release
          # candidate. Publish it under a side tag derived from the prerelease
          # identifier (rc/next/beta/alpha/...); a stable x.y.z publishes to
          # `latest` as before. The `|| TAG=next` guard keeps an unparseable
          # prerelease off `latest`.
          if [[ "$VERSION" == *-* ]]; then
            TAG="$(printf '%s' "$VERSION" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z]+).*/\1/')"
            # Fall back to `next` when the derivation is empty, did not match
            # (TAG still equals VERSION), OR resolves to `latest` in any case: a
            # prerelease id of literally `latest` (e.g. 2.14.0-latest[.1]) must
            # never take the `latest` dist-tag and hijack the default install.
            { [ -n "$TAG" ] && [ "$TAG" != "$VERSION" ] && [ "${TAG,,}" != latest ]; } || TAG=next
            echo "Publishing prerelease $VERSION under dist-tag: $TAG"
            npm publish --ignore-scripts --tag "$TAG"
          else
            echo "Publishing stable $VERSION under dist-tag: latest"
            npm publish --ignore-scripts
          fi
