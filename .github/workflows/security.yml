name: security

# Free-OSS security posture. This workflow runs in parallel to ci.yml on
# the same triggers and is the local equivalent of the GHAS feature set
# (CodeQL + secret scanning + dependency review) that isn't available on
# private free-plan orgs.
#
# Coverage map (matches verivus-oss/agent-assurance's posture):
#   actionlint      — GHA workflow correctness (broken expressions,
#                     deprecated APIs, shell-injection in `run:`)
#   zizmor          — GHA workflow security (impostor-commit, unpinned
#                     uses, excessive permissions, ambiguous inheritance)
#   shellcheck      — shell-script correctness for scripts/*.sh and
#                     installer/*.sh
#   typos           — source-code spellchecker (catches typo'd MCP tool
#                     names / env-var names / config keys)
#   gitleaks        — secret leak detection in commits + working tree
#                     (replaces GHAS secret scanning)
#   osv-scanner     — CVEs in package-lock.json (npm) and any Python
#                     lockfile under integrations/llm-plugin/.
#                     Complements Dependabot: catches transitive and
#                     advisory-DB-only entries Dependabot misses.
#   ruff            — Python deep linter (security `S` rules,
#                     correctness, dead-code); defense-in-depth above
#                     bandit on integrations/llm-plugin/.
#   bandit          — Python static security analysis on the same tree.
#   lychee          — link rot in README.md / CHANGELOG.md / docs/*
#
# Every step is SHA-pinned where the tool ships a stable release; binary
# downloads include SHA256 verification. `continue-on-error: false` is
# the default but made explicit to document intent — any finding fails
# the workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # workflow_dispatch lets a maintainer re-run the suite on demand
  # without pushing — useful when allowlisting a transient CVE or
  # verifying a tool upgrade.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: security (workflow + content + deps + secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Drop the auth token from .git/config after checkout so it
          # cannot be picked up by tool installers (zizmor artipacked).
          persist-credentials: false

      - name: Set up Python (for zizmor + ruff + bandit)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Set up Go (for actionlint)
        # actionlint is distributed as a Go binary. Pinning to "stable"
        # keeps us on the same line as the language's release cadence
        # rather than freezing a minor version that drifts.
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: "stable"

      # ---------------------------------------------------------------
      # Workflow integrity — gate everything that follows.
      # ---------------------------------------------------------------

      - name: Workflow lint (actionlint)
        # Lints the workflow files themselves: broken `${{ }}` expressions,
        # invalid runner labels, deprecated event names, shell-injection
        # patterns in `run:` blocks. A bug here would silently break every
        # other security step.
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color

      - name: Workflow security audit (zizmor)
        # Catches GHA-specific security antipatterns: impostor-commit
        # (action SHA pin that doesn't actually point at the claimed
        # release), unpinned action references, excessive token scopes,
        # credential persistence through artifacts.
        run: |
          set -euo pipefail
          python3 -m pip install --user --require-hashes -r requirements/ci/security.txt
          # Default min-severity (low+); informational findings (job
          # names, concurrency limits, superfluous actions) are tracked
          # but not enforced — those don't move the security needle.
          "$HOME/.local/bin/zizmor" .github/workflows/

      # ---------------------------------------------------------------
      # Content correctness — cheap, broad coverage.
      # ---------------------------------------------------------------

      - name: Shell-script lint (shellcheck)
        # ubuntu-latest pre-installs shellcheck. Our shell scripts run
        # under release / install / pg-test flows; correctness bugs here
        # would silently break gates.
        run: |
          set -euo pipefail
          shellcheck --version
          shellcheck \
            scripts/release-security-audit.sh \
            scripts/test-pg.sh \
            installer/build-release.sh

      - name: Source-code spellcheck (typos)
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2  # v1.46.3

      # ---------------------------------------------------------------
      # Secret + CVE scanning.
      # ---------------------------------------------------------------

      - name: Lock-file CVE scan (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          # --no-resolve disables network-required transitive dependency
          # resolution. package-lock.json has full transitive info baked
          # in; integrations/llm-plugin/ pyproject lacks a lockfile, so
          # gets direct-dep-only coverage (one dep: llm>=0.19). When we
          # add a requirements.lock or uv.lock we can re-enable
          # transitive resolution.
          scan-args: |-
            --recursive
            --no-resolve
            ./

      - name: Secret scan (gitleaks)
        # Install the official gitleaks binary at a pinned version (not
        # the gitleaks-action — the action requires an org license for
        # >25-member orgs and adds a Node.js dep we don't need). The
        # binary is a single static Go executable; the SHA256 below is
        # the published release checksum for the linux_x64 tarball.
        run: |
          set -euo pipefail
          VERSION="8.30.1"
          TARBALL="gitleaks_${VERSION}_linux_x64.tar.gz"
          # SHA256 fetched from the release artifact directly on
          # 2026-05-26. Update this pin when bumping the VERSION above.
          EXPECTED_SHA="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${TARBALL}" -o "/tmp/${TARBALL}"
          actual=$(sha256sum "/tmp/${TARBALL}" | awk '{print $1}')
          if [ "${actual}" != "${EXPECTED_SHA}" ]; then
            echo "FAIL: gitleaks tarball SHA256 mismatch."
            echo "  expected: ${EXPECTED_SHA}"
            echo "  actual:   ${actual}"
            exit 1
          fi
          mkdir -p /tmp/gitleaks-bin
          tar -xzf "/tmp/${TARBALL}" -C /tmp/gitleaks-bin gitleaks
          /tmp/gitleaks-bin/gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1

      # ---------------------------------------------------------------
      # Python (integrations/llm-plugin/) — small surface but ships to
      # PyPI, so security-lint it just like the npm surface.
      # ---------------------------------------------------------------

      - name: Python lint (ruff)
        # ruff is a polyglot Python linter that includes the
        # flake8-bandit security ruleset (S101..S702), plus correctness
        # (F), dead-code, bug patterns (B), and simplifications (SIM).
        # Pairs with bandit: ruff catches more correctness/bug patterns;
        # bandit catches a few AST taint patterns ruff doesn't.
        # Defense in depth.
        run: |
          set -euo pipefail
          # Rules selected:
          #   F = pyflakes — real bugs (unused imports, undefined names)
          #   S = flake8-bandit — security
          # Skip S404 (import subprocess) — same rationale as bandit:
          # pure informational, the call-site checks (S603, S602) are
          # what matter.
          "$HOME/.local/bin/ruff" check \
            --select S,F \
            --ignore S404 \
            --line-length 120 \
            integrations/llm-plugin/

      - name: Python static security analysis (bandit)
        # bandit catches subprocess shell=True, eval, pickle, weak
        # crypto, hardcoded credentials, path traversal patterns.
        run: |
          set -euo pipefail
          # --skip B404: this fires on every `import subprocess`
          # regardless of safe usage. The call-site checks (B602, B603,
          # B607) catch actual issues; B404 is informational noise.
          python3 -m bandit \
            --configfile integrations/llm-plugin/.bandit \
            --recursive integrations/llm-plugin/ \
            --severity-level low \
            --confidence-level low \
            --skip B404

      # ---------------------------------------------------------------
      # Link rot — keeps the published docs (npmjs, PyPI README, GH
      # release notes) honest.
      # ---------------------------------------------------------------

      - name: Link-rot scan (lychee)
        # lychee checks every http(s):// URL in tracked markdown and
        # TOML. Configured by lychee.toml at the repo root.
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          fail: true
