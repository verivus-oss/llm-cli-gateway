name: Build + upload desktop installer artifacts

# Triggered on `release: published` (matching npm-publish.yml semantics) so
# a single `gh release create vX.Y.Z` fans out to npm publish and installer
# artifact pipelines. A stable public-mirror release also starts the separate
# Pages deployment. `workflow_dispatch` is supported so a missed run can
# be rebuilt against an existing release without retagging; run it from the
# matching tag ref so Sigstore verification keeps the same tag-bound
# certificate identity as the release event.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build installer assets for (e.g. v1.5.1)"
        required: true
        type: string

# Default to read-only at the workflow level; only the upload job below
# escalates to `contents: write` for `gh release upload`. zizmor flags
# unscoped write permissions (excessive-permissions).
permissions:
  contents: read

jobs:
  resolve-tag:
    # Runner split: the public mirror (verivus-oss) gets free, elastic
    # GitHub-hosted runners; the private repo (verivusai-labs) keeps its
    # internal self-hosted runner so it doesn't burn paid Actions minutes.
    runs-on: ${{ github.repository == 'verivus-oss/llm-cli-gateway' && 'ubuntu-latest' || fromJSON('["self-hosted","linux","rust","x86_64","workhorse2"]') }}
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${DISPATCH_TAG}" ]; then
            expected_ref="refs/tags/${DISPATCH_TAG}"
            if [ "${REF}" != "${expected_ref}" ]; then
              echo "ERROR: workflow_dispatch release signing must be run from ${expected_ref}; current ref is ${REF}." >&2
              echo "Re-run the workflow using the existing release tag so Sigstore verification matches the published tag identity." >&2
              exit 1
            fi
            echo "tag=${DISPATCH_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux
            runs_on: '["self-hosted","linux","rust","x86_64","workhorse2"]'
            targets: "--target linux/amd64 --target linux/arm64"
          - artifact: windows
            runs_on: '"windows-latest"'
            targets: "--target windows/amd64"
          - artifact: macos-arm64
            runs_on: '"macos-15"'
            targets: "--target darwin/arm64"
          - artifact: macos-amd64
            runs_on: '"macos-15-intel"'
            targets: "--target darwin/amd64"
    # Same split as resolve-tag, but only for the Linux leg: on the public
    # mirror the Linux bootstrapper (CGO_ENABLED=0 pure-Go cross-compile,
    # no host toolchain needed) builds on GitHub-hosted ubuntu-latest; the
    # private repo keeps it on the internal self-hosted runner. Windows and
    # macOS legs are unaffected (always their matrix runner).
    runs-on: ${{ (matrix.artifact == 'linux' && github.repository == 'verivus-oss/llm-cli-gateway') && 'ubuntu-latest' || fromJSON(matrix.runs_on) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          # Drop the auth token from .git/config after checkout (zizmor
          # artipacked). Subsequent `gh release upload` runs in a
          # separate job that re-checks out with its own credentials.
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6 # zizmor: ignore[cache-poisoning]
        # cache-poisoning ignore rationale: no `cache:` set → no cache
        # read or written → no attack vector. zizmor's audit is
        # path-based and flags any setup-node on a release-triggered
        # workflow regardless of cache state.
        with:
          node-version: 24

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Track Go 1.26.5 (matches installer/go.mod). govulncheck flagged
          # crypto/x509 + net/textproto stdlib advisories (fixed in 1.26.4) and
          # later GO-2026-4970 / GO-2026-5856 (fixed in 1.26.5), so the shipped
          # bootstrapper binary must build on >= 1.26.5.
          # Bump in lock-step with installer/go.mod.
          go-version: "1.26.5"
          # setup-go enables caching by default — explicitly disable on
          # the release path. Without this, zizmor (correctly) flags
          # cache-poisoning.
          cache: false

      - name: Verify package.json version matches tag
        shell: bash
        env:
          REF_NAME: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Install npm deps + build gateway
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Build bootstrapper binary + platform bundle
        shell: bash
        env:
          REF_NAME: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          bash installer/build-release.sh --version "${TAG_VERSION}" ${{ matrix.targets }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: installer-${{ matrix.artifact }}
          path: |
            installer/dist/llm-cli-gateway-*
            !installer/dist/SHA256SUMS
            !installer/dist/release-manifest.json
          if-no-files-found: error

  package-and-upload:
    needs: [resolve-tag, build-binaries]
    runs-on: ubuntu-latest
    # ONLY job in this workflow that needs write — `gh release upload`
    # below appends installer artifacts to the existing release. `id-token:
    # write` is limited to this job so cosign can request the GitHub OIDC
    # token for Sigstore keyless signing.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          # `gh release upload` receives GH_TOKEN explicitly in the upload step.
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: installer-*
          path: installer/dist
          merge-multiple: true

      - name: Package combined release metadata
        shell: bash
        env:
          # Public base for the release-manifest.json copy/paste URLs. Points
          # at the GitHub release download URL pattern for this repo.
          RVWR_RELEASE_PUBLIC_BASE: https://github.com/${{ github.repository }}/releases/download/${{ needs.resolve-tag.outputs.tag }}
          RVWR_RELEASE_SIGNING_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release-installer.yml@${{ github.ref }}
          REF_NAME: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          TAG_VERSION="${REF_NAME#v}"
          bash installer/build-release.sh --version "${TAG_VERSION}" --skip-binaries --skip-bundle

      - name: Verify checksums (sanity check before upload)
        working-directory: installer/dist
        run: sha256sum --check SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"

      - name: Sign installer artifacts with Sigstore
        env:
          COSIGN_YES: "true"
          REL_TAG: ${{ needs.resolve-tag.outputs.tag }}
        working-directory: installer/dist
        shell: bash
        run: |
          TAG_VERSION="${REL_TAG#v}"
          shopt -s nullglob
          artifacts=(
            llm-cli-gateway-"${TAG_VERSION}"-*
            llm-cli-gateway-bundle-"${TAG_VERSION}"-*.tar.gz
            install-windows.ps1
            SHA256SUMS
            release-manifest.json
          )
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "ERROR: no release artifacts found to sign" >&2
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            if [[ "${artifact}" == *.sigstore.json ]]; then
              continue
            fi
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "${artifact}"
          done

      - name: Verify Sigstore signatures (sanity check before upload)
        env:
          REL_TAG: ${{ needs.resolve-tag.outputs.tag }}
          SIGNING_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release-installer.yml@${{ github.ref }}
        working-directory: installer/dist
        shell: bash
        run: |
          TAG_VERSION="${REL_TAG#v}"
          shopt -s nullglob
          artifacts=(
            llm-cli-gateway-"${TAG_VERSION}"-*
            llm-cli-gateway-bundle-"${TAG_VERSION}"-*.tar.gz
            install-windows.ps1
            SHA256SUMS
            release-manifest.json
          )
          for artifact in "${artifacts[@]}"; do
            if [[ "${artifact}" == *.sigstore.json ]]; then
              continue
            fi
            cosign verify-blob "${artifact}" \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity "${SIGNING_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          done

      - name: Upload installer artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ needs.resolve-tag.outputs.tag }}
        working-directory: installer/dist
        shell: bash
        run: |
          TAG_VERSION="${REL_TAG#v}"
          shopt -s nullglob
          upload_args=()
          for artifact in \
            llm-cli-gateway-"${TAG_VERSION}"-* \
            llm-cli-gateway-bundle-"${TAG_VERSION}"-*.tar.gz \
            install-windows.ps1 \
            SHA256SUMS \
            release-manifest.json; do
            if [[ "${artifact}" == *.sigstore.json ]]; then
              continue
            fi
            upload_args+=("${artifact}")
          done
          for artifact in *.sigstore.json; do
            if [[ "${artifact}" == *.sigstore.json.sigstore.json ]]; then
              continue
            fi
            if [[ ! -f "${artifact%.sigstore.json}" ]]; then
              continue
            fi
            upload_args+=("${artifact}")
          done
          # `--clobber` so a re-run via workflow_dispatch replaces stale assets.
          gh release upload "${REL_TAG}" "${upload_args[@]}" --clobber
