name: Build + upload desktop installer artifacts

# Triggered on `release: published` (matching npm-publish.yml / publish.yml
# semantics) so a single `gh release create vX.Y.Z` fans out to all three
# pipelines. `workflow_dispatch` is supported so a missed run can be
# rebuilt against an existing release without retagging.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build installer assets for (e.g. v1.5.1)'
        required: true
        type: string

permissions:
  contents: write   # gh release upload

jobs:
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${DISPATCH_TAG}" ]; then
            echo "tag=${DISPATCH_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: installer/go.mod

      - name: Verify package.json version matches tag
        env:
          REF_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Install npm deps + build gateway bundle
        run: |
          npm ci
          npm run build

      - name: Cross-compile bootstrapper + package Node bundle
        env:
          # Public base for the release-manifest.json copy/paste URLs. Points
          # at the GitHub release download URL pattern for this repo.
          RVWR_RELEASE_PUBLIC_BASE: https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}
        run: bash installer/build-release.sh

      - name: Verify checksums (sanity check before upload)
        working-directory: installer/dist
        run: sha256sum --check SHA256SUMS

      - name: Upload installer artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REL_TAG: ${{ steps.tag.outputs.tag }}
        working-directory: installer/dist
        run: |
          # `--clobber` so a re-run via workflow_dispatch replaces stale assets.
          gh release upload "${REL_TAG}" \
            llm-cli-gateway-*-darwin-arm64 \
            llm-cli-gateway-*-darwin-amd64 \
            llm-cli-gateway-*-linux-amd64 \
            llm-cli-gateway-*-linux-arm64 \
            llm-cli-gateway-*-windows-amd64.exe \
            llm-cli-gateway-bundle-*.tar.gz \
            SHA256SUMS \
            release-manifest.json \
            --clobber
