# gitleaks config — consumed by the "Secret scan (gitleaks)" step in
# .github/workflows/security.yml.
#
# Defaults are inherited (extend the bundled "default" config); only
# the allowlist below is local. Entries here are TEST FIXTURES with
# clearly fake values that gitleaks' generic-api-key heuristic catches.
# Each entry includes a comment explaining the fixture's purpose.

[extend]
useDefault = true

[allowlist]
description = "llm-cli-gateway allowlist: test fixtures, deliberate fake tokens"

# File-scope allowlist: paths that ONLY contain test fixtures and never
# real secrets. Adding paths here suppresses ALL findings under them —
# use sparingly and prefer regex matches over directory exclusion where
# possible.
paths = [
  # Build artefacts and lockfiles — gitleaks regularly false-positives
  # on minified or hashed strings here.
  '''dist/.*''',
  '''node_modules/.*''',
  '''package-lock\.json$''',
  '''integrations/llm-plugin/dist/.*''',
  '''integrations/llm-plugin/.*\.egg-info/.*''',
  # The secret-redaction unit test exists ONLY to exercise the redactor
  # against deliberately fake provider/cloud/VCS keys, JWTs, and PEM blocks
  # (F4). Every literal in it is a fixture, never a real secret.
  '''src/__tests__/secret-redaction\.test\.ts$''',
  # The gateway-logger redaction unit test asserts the central stderr logger
  # scrubs message strings, structured args, and nested Error name/stack
  # values. Every literal (fake api_key=, xai-, Bearer, etc.) is a deliberate
  # fixture that exists only to be redacted; there is no real secret.
  '''src/__tests__/gateway-logger\.test\.ts$''',
  # The branch-review-fixes suite pins the ACP error redactor (L6) against
  # deliberately fake Google (AIza), GitHub (ghp_), and Slack (xoxb) token
  # shapes; every literal exists only to be redacted, never a real secret.
  '''src/__tests__/branch-review-fixes\.test\.ts$''',
  # The provider-capability-cache suite exercises the capability-set secret
  # scrubber, so it is built entirely from deliberately fake keys (canonical
  # AWS example keys AKIA.../ASIA..., gsk_/ghp_/BEARER fixtures, etc.). Every
  # literal exists only to be scrubbed; there is no real secret.
  '''src/__tests__/provider-capability-cache\.test\.ts$''',
  # Native-compressor fixtures: real-shaped provider output samples (logs,
  # pretty JSON, ANSI captures) used to exercise the compressor transforms.
  # No real secrets; deliberate hash-like and control-byte content only.
  '''src/__tests__/fixtures/compressor/.*''',
]

# Regex-scope allowlist: specific secret patterns that gitleaks would
# otherwise flag. Each entry must match a deliberate test-fixture
# token literal — NOT a regex broad enough to mask real secrets.
regexes = [
  # http-transport.test.ts uses a hard-coded fake bearer token to
  # exercise the auth-token middleware end-to-end. Anyone reading the
  # test file can see the token is a fixture; there is no
  # corresponding deployment using it.
  '''test-bearer-XYZ-987''',
]
