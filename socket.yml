version: 2

# Socket alerts on llm-cli-gateway
# ---------------------------------
# This package intentionally triggers behavioural alerts. They are accurate
# descriptions of what the package does; the rationale for each is documented
# inline below and in detail under "Security Considerations" in README.md.
#
#   networkAccess
#     src/http-transport.ts opens an HTTP MCP transport (createServer/listen).
#     Defaults to 127.0.0.1, auth-token gated (LLM_GATEWAY_AUTH_TOKEN).
#     src/endpoint-exposure.ts also issues a HEAD probe when verifying
#     tunnel reachability — opt-in via the start:http entry point only.
#
#     Historical note: Socket previously flagged `dist/index.js` and
#     `dist/job-store.js` because async-job prose used retrieval wording that
#     resembled a browser-network primitive. The package now uses "collect" /
#     `collectWith` wording for deferred job results. Production code does not
#     import bundled HTTP client libraries; all default I/O is filesystem
#     (SQLite, sessions.json) or explicit local CLI process I/O.
#
#     Socket also flagged `dist/upstream-contracts.js` in v1.17.2 because a
#     Mistral CLI flag description contained browser retrieval wording. That
#     text is descriptive upstream metadata only; no network primitive is
#     imported or called from upstream-contracts.ts. The wording now uses
#     "remote retrieval" to avoid that heuristic.
#
#     Historical (resolved in 2.0.0): transitive tar-stream@2.2.0
#     (better-sqlite3 → prebuild-install → tar-fs) triggered Socket "Potential
#     vulnerability" (tar path traversal at install only). v1.17.7-1.17.9 worked
#     around it with a tar-stream 3.1.7 override + prod-only shrinkwrap. As of
#     2.0.0 the gateway uses Node's built-in `node:sqlite` for persistence;
#     better-sqlite3 is a devDependency only, so the prod graph has NO native
#     module and NO tar-stream/prebuild-install/tar-fs install chain. The
#     release security audit now hard-fails if any of those packages re-enter
#     the prod graph (and still blocks the flagged tar-stream 2.x versions).
#
#   shrinkwrap
#     The published npm package intentionally includes npm-shrinkwrap.json. It
#     is not an install-script bypass or a hidden dependency surface; it is a
#     prod-only projection generated from package-lock.json by
#     scripts/make-prod-shrinkwrap.mjs so registry consumers resolve the same
#     audited tree we release. scripts/release-security-audit.sh regenerates
#     that projection and hard-fails on mismatch, and
#     scripts/verify-registry-install.sh publishes to a temporary registry and
#     verifies a fresh consumer install has no better-sqlite3, prebuild-install,
#     tar-fs, or tar-stream production chain.
#
#     This is the npm-documented narrow use case for shrinkwrap: applications,
#     daemons, and command-line tools published through the registry for global
#     installs or devDependency use. llm-cli-gateway is a CLI/MCP appliance, not
#     a library whose users need unpinned transitive dependency control.
#
#     Historical note: releases that previously reported healthy public Socket
#     scores, including 2.3.0, 2.4.0, and 2.5.0, also shipped
#     npm-shrinkwrap.json. The same socket.yml shellAccess policy was present
#     there too. A public package-page alert on 2.6.x therefore reflects Socket
#     scoring/rescan behavior, not a newly introduced shrinkwrap or shell path.
#
#   shellAccess
#     This alert fires on every module that imports node:child_process, and
#     because spawning provider CLIs and git is the entire purpose of the package
#     it is a reviewed capability description, not a finding. `issueRules` can
#     quiet repository/PR policy surfaces, but Socket's public package page may
#     still display this alert for the published npm artifact.
#
#     INVARIANT enforced across ALL sites below: arguments are always passed
#     as an array and `shell: true` is NEVER set, so there is no shell
#     interpolation path for user input. `scripts/release-security-audit.sh`
#     guards the dynamic-execution surface. When you add a new module that
#     imports child_process, add it to this list so the alert location set
#     stays documented instead of reading like a regression.
#
#     Current production child_process sites (dist/*.js mirrors of src/*.ts):
#       - src/executor.ts          spawn(cmd, args) — provider CLI allow-list
#                                   (claude / codex / gemini / grok / vibe).
#       - src/worktree-manager.ts  spawn("git", args) — gateway-owned git
#                                   worktree lifecycle (add / list / prune /
#                                   remove / branch -D).
#       - src/cli-updater.ts       spawnSync(cmd, args) — provider CLI version
#                                   + upgrade checks.
#       - src/provider-status.ts   spawnSync(cmd, args) — provider login-status
#                                   probe.
#       - src/upstream-contracts.ts spawnSync(cmd, ["--help"]) — optional
#                                   installed-CLI contract probe.
#       - src/endpoint-exposure.ts spawnSync(process.execPath, ["-e", …]) —
#                                   out-of-process HEAD reachability probe
#                                   (opt-in via the start:http path only).
#       - src/async-job-manager.ts imports the ChildProcess *type* only for
#                                   job lifecycle tracking; it spawns via
#                                   executor.ts (spawnCliProcess), not directly.
#
#   usesEval
#     Not in our source. Transitive via @modelcontextprotocol/sdk → ajv@8,
#     which compiles JSON Schema validators using `new Function(...)`.
#     This is ajv's standard codegen path; no caller-supplied data flows
#     into the compiled function body.
#
#   SQLite (node:sqlite) adapter isolation
#     As of 2.0.0 persistence uses Node's built-in `node:sqlite` module (no
#     native binding, no install scripts) through a single adapter,
#     src/sqlite-driver.ts. No `db.pragma()` helper exists on node:sqlite and
#     the gateway never calls one; SQLite setup uses fixed literal
#     db.exec("PRAGMA ...") statements. The release security audit hard-fails
#     if production code references node:sqlite outside the adapter or
#     reintroduces a `.pragma()` call. (better-sqlite3 — and its
#     lib/methods/pragma.js that older Socket scans flagged — is now a
#     devDependency only and is absent from the published prod artifact.)

issueRules:
  # Defaults from Socket. Listed explicitly so future contributors see what
  # is enforced rather than relying on implicit defaults.
  malware: true
  troll: true
  didYouMean: true
  installScripts: true
  telemetry: true
  hasNativeCode: true # devDependency-only as of 2.0.0 (better-sqlite3); prod artifact has no native code
  shrinkwrap: false # reviewed published CLI lockfile; see rationale above
  shellAccess: false # reviewed gateway capability; see rationale above
  shellScriptOverride: true
  gitDependency: true
  httpDependency: true
  invalidPackageJSON: true
  unresolvedRequire: true

githubApp:
  enabled: true
  pullRequestAlertsEnabled: true
  dependencyOverviewEnabled: true
  projectReportsEnabled: true
