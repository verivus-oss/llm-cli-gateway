# Machine-readable install plan for assistant-led personal MCP setup.

[meta]
name = "llm-cli-gateway personal install"
schema_version = "1.0"
source_of_truth = "setup/ui/index.html"
doctor_command = "llm-cli-gateway doctor --json"

[[steps]]
id = "choose-targets"
depends_on = []
actor = "assistant"
action = "Ask which inbound client and outbound validation providers the user wants. The gateway brokers registered outbound providers: claude, codex, gemini, grok, mistral, devin, cursor, and configured HTTP API providers. Inbound clients are a separate set; mistral, devin, and cursor have provider-specific inbound MCP paths, while generic API providers are outbound-only."
idempotent = true
validation = "Selected targets map to setup/providers/*.md (including mistral-vibe.md for Mistral, devin.md for Devin, and cursor.md for Cursor) and unsupported targets are labeled deferred."

[[steps]]
id = "start-gateway"
depends_on = ["choose-targets"]
actor = "human_or_command_capable_assistant"
action = "Run the bootstrapper setup/start flow or open the local setup UI."
idempotent = true
validation = "doctor JSON exists and contains schema_version = 1.0."

[[steps]]
id = "check-diagnostics"
depends_on = ["start-gateway"]
actor = "assistant"
action = "Read redacted doctor JSON and summarize transport, auth, provider login, and endpoint exposure. Before proposing any web-client setup action, the assistant must ask whether the user wants managed Cloudflare Quick Tunnel or persistent/BYO HTTPS endpoint, ask whether the selected provider connector UI is available, inspect `endpoint_exposure.web_clients_supported` and `auth.token_configured`, and avoid inferring web-client readiness from `transport.http.enabled` alone. Per-provider readiness is gated by `providers.<name>.cli_available` for each requested CLI provider: claude, codex, gemini, grok, mistral, devin, or cursor. Configured HTTP API providers are gated by the `api_providers` doctor block and their key-env presence booleans, not raw key values. The doctor report also includes a top-level `cache_awareness` block; its presence is structural and all flags default off in 1.x, so the assistant must not treat it as a missing-config signal."
idempotent = true
validation = "No raw tokens, authorization headers, provider credentials, or tunnel tokens are requested or echoed. Assistant explicitly names `endpoint_exposure.web_clients_supported` and `auth.token_configured` when web-client targets are in scope. Assistant does not flag `cache_awareness` as a blocker when the user has not opted into cache-awareness features."

[[steps]]
id = "prepare-endpoint"
depends_on = ["check-diagnostics"]
actor = "human_or_command_capable_assistant"
action = "Use local endpoint for local clients, or configure HTTPS endpoint exposure for web clients by following setup/assistants/endpoint-exposure-agent-runbook.md. For web clients, check cloudflared availability, install it from an official OS package path when missing, run `llm-cli-gateway tunnel start`, verify with fresh `llm-cli-gateway doctor --json`, and generate client setup values with `llm-cli-gateway print-client-config`. For ChatGPT, create a local OAuth client with `llm-cli-gateway oauth client add chatgpt --redirect-uri <ChatGPT callback URL> --print-once` and paste the copy-once secret only into the provider setup field. Do not ask for or echo bearer tokens, OAuth client secrets, tunnel tokens, provider credentials, or authorization headers."
idempotent = true
validation = "Local clients have a local MCP URL; web clients require endpoint_exposure.https_configured = true, endpoint_exposure.public_url_configured = true, endpoint_exposure.web_clients_supported = true, and endpoint_exposure.reachable_from_web = reachable when verification is enabled."

[[steps]]
id = "apply-client-snippet"
depends_on = ["prepare-endpoint"]
actor = "human_or_command_capable_assistant"
action = "Apply the generated setup UI snippet for the selected client. If generated output is unavailable, adapt sanitized samples from setup/assistants/mcp-config-samples.md without inserting raw secrets into chat. For each outbound CLI provider in scope (claude, codex, gemini, grok, mistral, devin, cursor), confirm the corresponding doctor field is healthy: for mistral, additionally check `client_config.vibe_session_logging.session_logging_enabled` before exercising session-continuity flows. For configured HTTP API providers, confirm the named env var is present without printing its value."
idempotent = true
validation = "Fresh doctor JSON or client listing shows the client configuration is present when the client exposes such evidence. For mistral, `providers.mistral.cli_available` is true and any session-continuity callers see `client_config.vibe_session_logging.session_logging_enabled = true`."

[[steps]]
id = "verify-validation-tool"
depends_on = ["apply-client-snippet"]
actor = "human"
action = "In the selected client, ask: validate this sentence with two other models: gateway setup works."
idempotent = true
validation = "The client can call a validation tool or returns a concrete diagnostic blocker."

[rollback]
guidance = "Use the setup UI or bootstrapper repair/status output first. Restore any client config backup before removing gateway auth. Never disable gateway auth to work around setup failure."
